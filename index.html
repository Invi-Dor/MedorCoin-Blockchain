<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MedorCoin — Home</title>
<meta name="description" content="MedorCoin home portal."/>
<style>
  :root{--bg:#faf9f6;--ink:#1f2937;--muted:#6b7280;--border:#e5e7eb;--success:#10b981}
  {box-sizing:border-box}
  body{margin:0;font-family:Inter,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink)}
  a{color:inherit;text-decoration:none}
  .container{max-width:980px;margin:0 auto;padding:12px}
  .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.space{justify-content:space-between}
  .logo{display:flex;align-items:center;gap:10px}
  .logo img{height:36px;width:36px;border-radius:10px;object-fit:cover;border:1px solid #e8e1c7}
  .brand{font-weight:800;font-size:18px}
  .wallet-status{position:fixed;top:10px;right:10px;background:var(--success);color:white;padding:8px 12px;border-radius:20px;font-size:12px;font-weight:600;z-index:1000;box-shadow:0 4px 12px rgba(16,185,129,0.3);display:none}
  .searchbar{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--border);border-radius:999px;padding:10px 12px;margin-top:10px}
  .searchbar input{border:0;outline:0;flex:1;font-size:14px;color:var(--ink);background:transparent}
  .pill{font-size:12px;background:#fff7e6;color:#333333;border:1px solid #f2e6bf;border-radius:999px;padding:4px 8px}
  .tabs{display:flex;gap:10px;overflow:auto;padding:10px 0;margin-top:8px}
  .tab{display:flex;align-items:center;gap:6px;background:#f3f4f6;border:1px solid var(--border);color:var(--ink);border-radius:999px;padding:8px 12px;font-size:13px;white-space:nowrap}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:10px}
  .tile{background:#fff;border:1px solid var(--border);border-radius:14px;padding:12px;min-height:96px;display:flex;flex-direction:column;gap:8px;justify-content:center}
  .muted{color:var(--muted);font-size:12px}
  .icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center}
  .icon svg{width:22px;height:22px;display:block}
  .ic-gold{background:#fff7e6;border:1px solid #f2e6bf}
  .ic-slate{background:#eef1f5;border:1px solid #e2e8f0}
</style>
</head>
<body>
<!-- WALLET STATUS -->
<div id="walletStatus" class="wallet-status"></div>

<div class="container">
  <div class="row space" style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:12px 16px;border-radius:14px;margin-bottom:16px">
    <div class="logo">
      <img src="assets/logo.png" alt="MedorCoin Logo"/>
      <div class="brand">MedorCoin</div>
    </div>
    <div style="font-size:11px;font-family:Arial,Helvetica,sans-serif;white-space:nowrap;">
      <a href="create-wallet.html" style="color:white;text-decoration:none;">Create Wallet</a> |
      <a href="connect-wallet.html" style="color:white;text-decoration:none;">Connect Wallet</a> |
      <a href="signup.html" style="color:white;text-decoration:none;">SignUp</a> |
      <a href="login.html" style="color:white;text-decoration:none;">Login</a>
    </div>
  </div>

  <div class="searchbar">
    <span style="opacity:.7">🔎</span>
    <input id="q" placeholder="Search"/>
    <span class="pill">AI</span>
  </div>

  <div class="tabs">
    <a class="tab" href="index.html">🏠 HomePage</a>
    <a class="tab" href="miners.html">⛏️ Miners</a>
    <a class="tab" href="developers.html">👩‍💻 Developers</a>
    <a class="tab" href="trading.html">📈 Crypto Trading</a>
  </div>

  <div class="grid">
    <a class="tile" href="/blockchain.html">
      <div class="icon ic-slate" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="#B5943F" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="5" cy="6" r="2.4" fill="#F1E8C6" stroke="#B5943F"/>
          <circle cx="19" cy="6" r="2.4" fill="#F1E8C6" stroke="#B5943F"/>
          <circle cx="5" cy="18" r="2.4" fill="#F1E8C6" stroke="#B5943F"/>
          <circle cx="19" cy="18" r="2.4" fill="#F1E8C6" stroke="#B5943F"/>
          <path d="M7.2 6h9.6"/><path d="M5 8.6v6.8"/><path d="M19 8.6v6.8"/><path d="M6.6 16.8L10.8 12h-2.2l4.8-4.8M12.8 12l4.6 4.6"/>
        </svg>
      </div>
      <b>Blockchain</b>
      <span class="muted">On-chain tools & explorer</span>
    </a>
    
    <!-- Other tiles remain unchanged -->
    
  </div>

  <footer style="margin:14px 0;color:var(--muted);font-size:12px">MedorCoin ©</footer>
</div>

<!-- Link to your JavaScript file -->
<script src="index.js"></script>
<script>
// Check if a wallet exists and update the UI
const urlParams = new URLSearchParams(window.location.search);
const walletStorage = localStorage.getItem('medorcoin_wallet_v2');
if (urlParams.get('wallet') === 'created' || walletStorage) {
    const walletData = walletStorage ? JSON.parse(walletStorage) : {};
    const statusEl = document.getElementById('walletStatus');
    statusEl.style.display = 'block';
    statusEl.innerHTML = `✅ Wallet Active: ${walletData.address?.slice(0, 12) || 'Connected'}...`;
    
    // Update Create Wallet link to show "Wallet Created"
    const createLink = document.querySelector('a[href="create-wallet.html"]');
    if (createLink) createLink.textContent = '✅ Wallet Created';
}

// Copyright year script
document.getElementById('currentYear') ? document.getElementById('currentYear').textContent = new Date().getFullYear() : null;
</script>
</body>
</html>
