<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MedorCoin - Welcome</title>
  <meta name="description" content="Lock-ups, vesting, and time-locked contracts for MedorCoin."/>
  <style>
    :root{--bg:#faf9f6;--ink:#1f2937;--muted:#6b7280;--border:#e5e7eb}
    *{box-sizing:border-box} 
    body{margin:0;font-family:Inter,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink)}
    a{color:#B5943F;text-decoration:none} a:hover{text-decoration:underline}
    .container{max-width:980px;margin:0 auto;padding:12px}
    .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.space{justify-content:space-between}
    .logo{display:flex;align-items:center;gap:10px}
    .logo img{height:36px;width:36px;border-radius:10px;object-fit:cover;border:1px solid #e8e1c7}
    .brand{font-weight:800;font-size:18px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:10px}
    .tile{background:#fff;border:1px solid var(--border);border-radius:14px;padding:12px;min-height:96px;display:flex;flex-direction:column;gap:8px;justify-content:center}
    .icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:#fff7e6;border:1px solid #f2e6bf}
    .muted{color:var(--muted);font-size:12px}
    .icon svg{width:22px;height:22px;display:block}
  </style>
</head>
<body>
  <div class=
"container">
    <div class="row space">
      <div class="logo"><img src="assets/logo.png" alt="MedorCoin Logo"/><div class="brand">MedorCoin</div></div>
    </div>

    <h2 style="margin:8px 0 0 2px">🔒 Locks</h2>
    <div class="muted" style="margin:4px 2px 10px">Lock-ups, vesting, and time-locked contracts.</div>

    <div class="grid">
      <!-- Explorer Tile (links to Explorer.html) -->
      <a class="tile" href="Explorer.html" style="grid-column:1;">
        <div class="icon" aria-hidden="true">🔎</div>
        <b> BlockchainExplorer</b>
        <span class="muted">Blockchain lookup</span>
      </a>

      <!-- Column 1: General (row 1) -->
      <a class="tile" href="beware-of-scams.html" style="grid-column:1;">
        <div class="icon" aria-hidden="true">
          <!-- simple lock icon -->
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#1f2937" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 11V9a6 6 0 1 1 12 0v2"/><path d="M8 11V9a4 4 0 1 1 8 0v2"/><rect x="6" y="11" width="12" height="9" rx="2" fill="#D7BF77" stroke="#B5943F" stroke-width="1.4"/>
          </svg>
        </div>
        <b>Buy Lock</b>
        <span class="muted">Create a lock</span>
      </a>

      <a class="tile" href="vesting.html" style="grid-column:1;">
        <div class="icon" aria-hidden="true">🗓️</div>
        <b>Vesting</b>
        <span class="muted">Schedules & cliffs</span>
      </a>

      <a class="tile" href="contracts.html" style="grid-column:1;">
        <div class="icon" aria-hidden="true">📜</div>
        <b>Contracts</b>
        <span class="muted">Audits & addresses</span>
      </a>

      <!-- Column 2: Introduction (row 1) -->
      <a class="tile" href="general.html" style="grid-column:2;">
        <div class="icon" aria-hidden="true">🧭</div>
        <b>Introduction</b>
        <span class="muted">Overview & basics</span>
      </a>

      <!-- Row 2 -->
      <a class="tile" href="security.html" style="grid-column:1;">
        <div class="icon" aria-hidden="true">🛡️</div>
        <b>Security</b>
        <span class="muted">Audits & risk</span>
      </a>

      <a class="tile" href="compliance.html" style="grid-column:2;">
        <div class="icon" aria-hidden="true">⚖️</div>
        <b>Compliance</b>
        <span class="muted">Regulatory</span>
      </a>
    </div>

    <p class="muted" style="margin-top:14px"><a href="index.html">← Back to Home</a></p>
  </div>
</body>
</html>
