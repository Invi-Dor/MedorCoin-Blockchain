<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MedorCoin - Professional Locker</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        :root { --accent: #ff8a00; --bg: #0f1013; --card: #15171b; --text: #f1f5f9; --border: #232630; }
        body { margin: 0; display: flex; background: var(--bg); color: var(--text); font-family: sans-serif; }
        .sidebar { width: 240px; background: #000; height: 100vh; padding: 20px; border-right: 1px solid var(--border); position: fixed; }
        .sidebar a { display: block; color: #a3a3a3; padding: 12px; text-decoration: none; border-radius: 8px; cursor: pointer; }
        .sidebar a.active { background: var(--card); color: var(--accent); border-left: 4px solid var(--accent); }
        .main { margin-left: 240px; padding: 40px; width: 100%; }
        .container { max-width: 500px; background: var(--card); padding: 30px; border-radius: 16px; border: 1px solid var(--border); }
        input { width: 100%; padding: 12px; margin: 10px 0 20px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 8px; }
        button { width: 100%; padding: 16px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color:var(--accent)">MEDOR LOCKS</h2>
        <a onclick="setMode('liquidity')" id="m-liquidity" class="active">💧 Liquidity Lock</a>
        <a onclick="setMode('token')" id="m-token">🪙 Token Lock</a>
        <a onclick="setMode('nft')" id="m-nft">🖼️ NFT Safe</a>
        <a href="vesting.html">⏳ Vesting</a>
    </div>
    <div class="main">
        <div id="conn-box"><button onclick="connect()">Connect Wallet</button></div>
        <div id="ui-box" style="display:none" class="container">
            <h1 id="title">Liquidity Lock</h1>
            <p>Flat Service Fee: <b id="fee-display">...</b> ETH</p>
            <input type="text" id="tkAddr" placeholder="Contract Address">
            <input type="number" id="amt" placeholder="Amount">
            <input type="datetime-local" id="date">
            <button onclick="doLock()">Execute Lock</button>
        </div>
    </div>
    <script>
        const CONTRACT_ADDR = "0xYourLockerContractAddress"; // PASTE YOUR CONTRACT ADDRESS HERE
        let signer, contract, mode = 'liquidity';

        function setMode(m) {
            mode = m; document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
            document.getElementById('m-'+m).classList.add('active');
            document.getElementById('title').innerText = m.charAt(0).toUpperCase() + m.slice(1) + " Lock";
        }

        async function connect() {
            const p = new ethers.providers.Web3Provider(window.ethereum);
            await p.send("eth_requestAccounts", []);
            signer = p.getSigner();
            contract = new ethers.Contract(CONTRACT_ADDR, [
                "function flatFee() view returns (uint256)",
                "function createLock(address t, uint256 a, uint256 u, bool n) external payable"
            ], signer);
            document.getElementById('ui-box').style.display = 'block';
            document.getElementById('conn-box').style.display = 'none';
            const fee = await contract.flatFee();
            document.getElementById('fee-display').innerText = ethers.utils.formatEther(fee);
        }

        async function doLock() {
            const fee = await contract.flatFee();
            const tx = await contract.createLock(
                document.getElementById('tkAddr').value,
                ethers.utils.parseEther(document.getElementById('amt').value),
                Math.floor(new Date(document.getElementById('date').value).getTime() / 1000),
                mode === 'nft',
                { value: fee }
            );
            await tx.wait(); alert("Locked!");
        }
    </script>
</body>
</html>
