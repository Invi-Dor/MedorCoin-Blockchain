<style>
  :root{
    --bg:#0f1013;         /* dark background */
    --bg-elev:#15171b;
    --ink:#f1f5f9;
    --muted:#a3a3a3;
    --border:#232630;
    --accent:#ff8a00;
    --accent-2:#ffb84d;
    --accent-3:#ffd199;
    --pill:#1c2029;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;font-family:Inter,Segoe UI,Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;color:var(--ink);background:var(--bg)}
  a{text-decoration:none;color:inherit}

  header{text-align:center;padding:14px 0;font-weight:800;font-size:22px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;padding:12px}
  .card{background:var(--bg-elev);border:1px solid var(--border);border-radius:16px;padding:14px;text-align:center;transition:transform .2s;display:flex;flex-direction:column;align-items:center;gap:8px}
  .card:hover{transform:scale(1.05)}
  .icon-img{width:48px;height:48px;border-radius:12px;object-fit:cover}
  .label{font-weight:700;font-size:14px;text-align:center;color:var(--ink)}
</style>
</head>
