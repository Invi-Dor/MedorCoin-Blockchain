<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>MedorCoin Mining - Miners</title>
  <style>
    :root{ --bg:#0f1013; --bg-elev:#15171b; --ink:#f8fafa; --muted:#a3a3a3; --border:#232630; --accent:#ff8a00; --accent-2:#ffb84d; --pill:#1c2029; }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,sans-serif;line-height:1.45}
    a{color:var(--accent-2);text-decoration:none}
    .app{max-width:1120px;margin:0 auto;padding:0 16px}
    .topbar{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,#0f1013 60%,#0f1013cc);border-bottom:1px solid var(--border)}
    .status{display:flex;justify-content:space-between;align-items:center;padding:10px 14px}
    .balance{display:flex;gap:8px;align-items:center}
    .badge{background:var(--accent);color:#1a1a1a;border-radius:999px;padding:2px 8px;font-weight:800}
    .panel{background:var(--bg-elev);border:1px solid var(--border);border-radius:14px;padding:14px;margin:14px 0}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .kicker{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent-2)}
    .title{font-weight:800;font-size:18px}
    .row{display:flex;justify-content:space-between;gap:8px;align-items:center}
    .btn{display:inline-flex;gap:8px;align-items:center;padding:10px 14px;border-radius:10px;border:1px solid #0000;cursor:pointer;background:linear-gradient(180deg,var(--accent-2),var(--accent));font-weight:800;color:#1a1a1a;transition: opacity 0.2s;}
    .btn.secondary{background:#0f1115;border:1px solid var(--border);color:#f1f5f9}
    .card{border:1px solid var(--border);border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:8px}
    .price{font-weight:800;color:#ffce7a}
    .speed{font-weight:700;color:#ffdca8}
    .big{font-size:28px;font-weight:800}
    .muted{color:var(--muted);font-size:12px}
    .how-it-works { background: #fdf6e3; color: #333; padding: 30px; border-radius: 12px; margin-top: 20px; }
    .how-it-works h2, .how-it-works h3 { color: #000; margin-top: 0; text-transform: uppercase; }
    #navDropdown.active { display: flex !important; }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="status">
        <div class="balance">
          <span class="badge">MEDOR coin mining</span>
          <span id="walletBalance" style="font-family: monospace">0.00000000 MEDOR</span>
        </div>
        <div class="row" id="authContainer">
          <a href="login.html" class="muted">Login</a>
          <a href="signup.html" class="badge" style="margin-left:12px">Sign Up</a>
          <button class="menu-trigger" style="background:none; border:none; color:#fff; cursor:pointer; font-size:20px; margin-left:15px;" onclick="toggleMenu()">☰</button>
        </div>
      </div>
      <nav id="navDropdown" style="display:none; position:absolute; right:16px; top:50px; background:#000; border:1px solid var(--border); flex-direction:column; width:180px; z-index:100;">
          <a href="miners.html" style="padding:12px; border-bottom:1px solid #222;">Mining</a>
          <a href="wallet.html" style="padding:12px; border-bottom:1px solid #222;">Wallet</a>
          <a href="faq.html" style="padding:12px;">FAQ</a>
      </nav>
    </div>

    <div class="panel">
        <div class="kicker">Total Mining Pool Balance</div>
        <div class="big" id="liveBalance">0.00000000 MEDOR</div>
        <div class="muted">Speed: <span id="liveTotalSpeed">0.00</span> GH/s</div>
    </div>

    <div class="grid">
        <!-- Contracts and subscriptions follow your original design -->
        <div class="card">
            <div class="kicker">Free Contract</div>
            <div class="price">4 GH/s</div>
            <button class="btn" onclick="sendAction('claimFree')">Claim 12H</button>
        </div>
        <!-- ... rest of your cards ... -->
    </div>

    <section class="how-it-works">
        <h2>How It Works</h2>
        <p>MEDOR is the token of the MEDORCOIN blockchain. You can mine it using any device...</p>
    </section>
  </div>

<script>
    // HARDENED BACKEND CONNECTION
    const API_BASE = "https://medorcoin.org"; 
    
    function toggleMenu() { document.getElementById('navDropdown').classList.toggle('active'); }

    // REAL SYNC: Fetches from your 172.235.50.31 cluster
    async function syncWithNode() {
        const token = localStorage.getItem('medor_token');
        if (!token) return;

        try {
            const res = await fetch(`${API_BASE}/metrics`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            document.getElementById('liveBalance').innerText = data.poolBalance + " MEDOR";
            document.getElementById('walletBalance').innerText = data.userBalance + " MEDOR";
            document.getElementById('liveTotalSpeed').innerText = data.networkHashrate;
        } catch (e) { console.error("Cluster connection failed."); }
    }

    // PRODUCTION ACTION: Starts backend work
    async function sendAction(type) {
        const token = localStorage.getItem('medor_token');
        if (!token) { window.location.href='login.html'; return; }

        await fetch(`${API_BASE}/action`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ action: type })
        });
        alert("Action sent to Los Angeles V8 Cluster.");
    }

    setInterval(syncWithNode, 5000);
</script>
</body>
</html>
