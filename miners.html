<script>
    // --- REAL BACKEND CONNECTION ---
    const API_BASE = "http://172.235.50.31:3000"; 
    let state = { balance: "0.00000000", speed: "0.00" };

    // 1. FETCH REAL DATA FROM THE V8 CLUSTER
    async function syncWithNode() {
        try {
            // This calls your real Miner.cjs metrics
            const response = await fetch(`${API_BASE}/api/metrics`);
            const data = await response.json();
            
            state.balance = data.poolBalance; 
            state.speed = data.networkHashrate;
            
            updateUI();
        } catch (e) {
            console.error("Node offline. Ensure miner.cjs is running on 172.235.50.31");
        }
    }

    // 2. SUBMIT WORK (No more fake mining)
    async function startMining() {
        const user = JSON.parse(localStorage.getItem('medor_user'));
        if (!user) { window.location.href = 'login.html'; return; }

        // This actually connects the user to your industrial miner
        const res = await fetch(`${API_BASE}/api/start-work`, {
            method: 'POST',
            body: JSON.stringify({ address: user.address })
        });
        
        if(res.ok) console.log("Worker assigned to Los Angeles Cluster.");
    }

    function updateUI() {
        document.getElementById('live-balance').innerText = state.balance + " MEDOR";
        document.getElementById('liveTotalSpeed').innerText = state.speed;
    }

    // Sync every 5 seconds
    setInterval(syncWithNode, 5000);
</script>
