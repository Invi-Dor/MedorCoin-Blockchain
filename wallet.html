<style>
/* ... [Keep all your existing CSS exactly as it was] ... */
:root {
  --bg:     #0b0f1a;
  --panel:  #12182a;
  --cyan:   #00eaff;
  --dim:    #00b8cc;
  --text:   #e8faff;
  --muted:  #9bb3c9;
  --danger: #ff4d6d;
  --green:  #10b981;
  --border: rgba(0,234,255,0.15);
  --red:    #f43f5e;
}
*,::before,::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);overflow-x:hidden;font-family:"Segoe UI",system-ui,sans-serif;}
#wrapper{display:flex;min-height:100vh;}
#sidebar{width:220px;background:var(--panel);border-right:1px solid var(--border);padding:24px 16px;flex-shrink:0;transition:transform 0.3s ease;}
.brand{font-size:18px;font-weight:800;color:var(--cyan);letter-spacing:1px;margin-bottom:28px;display:block;}
#sidebar a{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;color:var(--text);text-decoration:none;margin-bottom:4px;font-size:14px;transition:0.2s;}
#sidebar a:hover,#sidebar a.active{background:rgba(0,234,255,0.1);color:var(--cyan);}
.divider{height:1px;background:var(--border);margin:14px 0;}
.logout-btn{width:100%;padding:11px 14px;border-radius:10px;background:rgba(255,77,109,0.08);border:1px solid rgba(255,77,109,0.25);color:var(--danger);cursor:pointer;font-size:14px;text-align:left;font-family:inherit;transition:0.2s;}
.logout-btn:hover{background:rgba(255,77,109,0.18);}
#content{flex:1;padding:28px;overflow-y:auto;}
.topbar{display:none;align-items:center;justify-content:space-between;margin-bottom:20px;}
.hamburger{font-size:24px;cursor:pointer;color:var(--cyan);background:none;border:none;}
.card{background:var(--panel);padding:22px;border-radius:16px;margin-bottom:20px;border:1px solid var(--border);box-shadow:0 0 20px rgba(0,234,255,0.04);}
.card h3{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--cyan);margin-bottom:16px;}
.balance-card{background:linear-gradient(135deg,#0d1f35,#091830);border-color:rgba(0,234,255,0.25);}
.balance-amount{font-size:40px;font-weight:800;margin-bottom:4px;}
.balance-usd{font-size:15px;color:var(--muted);}
.balance-actions{display:flex;gap:12px;margin-top:20px;flex-wrap:wrap;}
.action-btn{flex:1;min-width:90px;padding:13px;border-radius:10px;border:none;cursor:pointer;font-weight:700;font-size:14px;transition:0.2s;font-family:inherit;}
.action-btn.p{background:linear-gradient(135deg,var(--cyan),var(--dim));color:#001018;}
.action-btn.p:hover{box-shadow:0 0 20px rgba(0,234,255,0.4);}
.action-btn.s{background:rgba(0,234,255,0.07);border:1px solid var(--border);color:var(--text);}
.action-btn.s:hover{border-color:var(--cyan);color:var(--cyan);}
label{font-size:12px;color:var(--muted);display:block;margin-bottom:5px;}
input,textarea{width:100%;padding:12px 14px;background:#0b0f1a;border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color 0.2s;margin-bottom:14px;}
input:focus{border-color:var(--cyan);}
input[readonly]{color:var(--muted);cursor:default;}
.input-row{display:grid;grid-template-columns:2fr 1fr;gap:12px;}
.btn{width:100%;padding:14px;border-radius:10px;border:none;cursor:pointer;font-weight:700;font-size:15px;transition:0.2s;font-family:inherit;}
.btn.primary{background:linear-gradient(135deg,var(--cyan),var(--dim));color:#001018;}
.btn.primary:hover{box-shadow:0 0 20px rgba(0,234,255,0.4);}
.btn.primary:disabled{opacity:0.4;cursor:not-allowed;}
.btn.danger{background:linear-gradient(135deg,#dc2626,var(--red));color:#fff;}
.ok {color:#6ee7b7;font-size:13px;margin-top:8px;}
.err{color:#fca5a5;font-size:13px;margin-top:8px;}
.info{color:var(--muted);font-size:13px;margin-top:8px;}
.copy-hint{font-size:12px;color:var(--cyan);cursor:pointer;display:inline-block;margin-top:-8px;margin-bottom:12px;transition:0.2s;}
.copy-hint:hover{opacity:0.7;}
.tx-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);font-size:14px;}
.tx-item:last-child{border-bottom:none;}
.tx-addr{color:var(--muted);font-size:12px;margin-top:2px;word-break:break-all;}
.tx-amt.in {color:#6ee7b7;}
.tx-amt.out{color:#fca5a5;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--danger);display:inline-block;margin-right:6px;vertical-align:middle;transition:background 0.3s;}
.dot.on{background:var(--green);}
.page{display:none;}
.page.active{display:block;}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,0.25);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:900px){
  #sidebar{position:fixed;top:0;left:0;height:100%;z-index:1000;transform:translateX(-100%);}
  #sidebar.open{transform:translateX(0);}
  .topbar{display:flex;}
  #content{padding:16px;}
}
</style>
</head>
