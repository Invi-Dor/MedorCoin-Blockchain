<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedorCoin Wallet</title>

<style>
:root {
  --bg-dark: #0b0f1a;
  --panel-bg: #12182a;
  --neon-blue: #00eaff;
  --neon-blue-strong: #00cfff;
  --text-light: #e8faff;
  --text-muted: #9bb3c9;
  --danger: #ff4d4f;
}

/* Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

html, body {
  width: 100%;
  height: 100%;
  background: var(--bg-dark);
  color: var(--text-light);
  overflow-x: hidden;
}

/* Layout */
#wrapper {
  display: flex;
  min-height: 100vh;
}

/* Sidebar */
#sidebar {
  width: 240px;
  background: var(--panel-bg);
  border-right: 1px solid rgba(0, 234, 255, 0.1);
  padding: 20px;
  transition: transform 0.3s ease;
}

#sidebar h2 {
  color: var(--neon-blue);
  margin-bottom: 30px;
  font-size: 22px;
}

/* Nav Links */
#sidebar a {
  display: block;
  padding: 12px;
  border-radius: 8px;
  color: var(--text-light);
  text-decoration: none;
  margin-bottom: 8px;
  transition: 0.2s;
}
#sidebar a:hover {
  background: rgba(0,234,255,0.1);
  color: var(--neon-blue);
}

/* Mobile Sidebar */
#sidebar.mobile-hidden {
  transform: translateX(-100%);
  position: fixed;
  height: 100%;
  z-index: 1000;
}

/* Main Content */
#content {
  flex: 1;
  padding: 24px;
  overflow-y: auto;
}

/* Top Bar */
.topbar {
  display: none;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.hamburger {
  font-size: 26px;
  cursor: pointer;
  color: var(--neon-blue);
}

/* Cards */
.card {
  background: var(--panel-bg);
  padding: 20px;
  border-radius: 14px;
  margin-bottom: 20px;
  border: 1px solid rgba(0,234,255,0.2);
  box-shadow: 0 0 10px rgba(0,234,255,0.1);
}
.card h3 {
  margin-bottom: 12px;
  color: var(--neon-blue);
}

/* Balance */
.balance {
  font-size: 32px;
  font-weight: bold;
}

/* Inputs */
input, textarea, select {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  margin-bottom: 14px;
  background: #0e1422;
  border: 1px solid rgba(0,234,255,0.2);
  border-radius: 10px;
  color: var(--text-light);
  font-size: 15px;
}

/* Buttons */
.button {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-blue-strong));
  border: none;
  border-radius: 10px;
  font-weight: bold;
  color: #001018;
  cursor: pointer;
  margin-top: 10px;
  transition: 0.3s;
  font-size: 15px;
}
.button:hover {
  box-shadow: 0 0 18x rgba(0,234,255,0.5);
}

/* Responsive */
@media (max-width: 900px) {
  #sidebar {
    position: fixed;
    height: 100%;
    z-index: 1000;
  }
  .topbar {
    display: flex;
  }
  #wrapper {
    flex-direction: column;
  }
}
</style>
</head>

<body>

<div id="wrapper">

  <!-- Sidebar -->
  <div id="sidebar" class="mobile-hidden">
    <h2>MedorCoin</h2>
    <a href="#" onclick="showPage('dashboard')">Dashboard</a>
    <a href="#" onclick="showPage('send')">Send</a>
    <a href="#" onclick="showPage('receive')">Receive</a>
    <a href="#" onclick="showPage('history')">History</a>
    <a href="#" onclick="showPage('backup')">Backup</a>
    <a href="#" onclick="showPage('security')">Security</a>
    <a href="#" onclick="showPage('advanced')">Advanced</a>
  </div>

  <!-- Main Content -->
  <div id="content">

    <!-- Top Bar for Mobile -->
    <div class="topbar">
      <span class="hamburger" onclick="toggleSidebar()">☰</span>
      <span style="color: var(--neon-blue); font-weight: bold;">MedorCoin</span>
    </div>

    <!-- Dashboard Page -->
    <div id="dashboard" class="page">
      <div class="card">
        <h3>Wallet Balance</h3>
        <div class="balance" id="balanceDisplay">0.000 MED</div>
      </div>

      <!-- Address -->
      <div class="card">
        <h3>Your Address</h3>
        <input type="text" id="dashboardAddress" readonly>
      </div>
    </div>

    <!-- Send Page -->
    <div id="send" class="page" style="display:none;">
      <div class="card">
        <h3>Send MedorCoin</h3>
        <label>Recipient</label>
        <input type="text" id="sendTo">
        <label>Amount</label>
        <input type="number" id="sendAmt">
        <button class="button" onclick="alert('Send logic pending')">Send</button>
      </div>
    </div>

    <!-- Receive Page -->
    <div id="receive" class="page" style="display:none;">
      <div class="card">
        <h3>Receive</h3>
        <input type="text" id="receiveAddress" readonly>
      </div>
    </div>

    <!-- History Page -->
    <div id="history" class="page" style="display:none;">
      <div class="card">
        <h3>Tx History</h3>
        <div id="txList">No history yet</div>
      </div>
    </div>

    <!-- Backup Page -->
    <div id="backup" class="page" style="display:none;">
      <div class="card">
        <h3>Backup Wallet</h3>
        <button class="button" onclick="alert('Backup logic pending')">Download Backup</button>
      </div>
    </div>

    <!-- Security Page -->
    <div id="security" class="page" style="display:none;">
      <div class="card">
        <h3>Security</h3>
        <button class="button" onclick="alert('Lock & Passphrase logout pending')">Logout</button>
      </div>
    </div>

    <!-- Advanced Page -->
    <div id="advanced" class="page" style="display:none;">
      <div class="card">
        <h3>Advanced</h3>
        <button class="button">Developer Mode</button>
      </div>
    </div>

  </div>
</div>

<script>
let storedWallet = null;

// Toggle sidebar mobile
function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("mobile-hidden");
}

// Page navigation
function showPage(id) {
  document.querySelectorAll(".page").forEach(p => p.style.display="none");
  document.getElementById(id).style.display="block";
  if(window.innerWidth < 900) toggleSidebar();
}

// Load wallet
function loadWallet() {
  const w = localStorage.getItem("medorcoin_wallet");
  if(!w) {
    alert("No wallet found. Redirecting to Create Wallet.");
    window.location.href = "create-wallet.html";
    return;
  }
  storedWallet = JSON.parse(w);
  document.getElementById("dashboardAddress").value = storedWallet.address;
  document.getElementById("receiveAddress").value = storedWallet.address;
}

window.onload = loadWallet;
</script>

</body>
</html>
