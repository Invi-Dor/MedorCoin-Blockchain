<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedorCoin Wallet</title>

<style>
:root {
  --bg-dark: #0b0f1a;
  --panel-bg: #12182a;
  --neon-blue: #00eaff;
  --neon-blue-strong: #00cfff;
  --text-light: #e8faff;
  --text-muted: #9bb3c9;
  --danger: #ff4d4f;
}

/* Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

html, body {
  width: 100%;
  height: 100%;
  background: var(--bg-dark);
  color: var(--text-light);
  overflow-x: hidden; /* prevents horizontal scrolling */
}

/* Layout */
#wrapper {
  display: flex;
  min-height: 100vh;
}

/* Sidebar */
#sidebar {
  width: 240px;
  background: var(--panel-bg);
  border-right: 1px solid rgba(0, 234, 255, 0.1);
  padding: 20px;
  transition: transform 0.3s ease;
}

#sidebar h2 {
  color: var(--neon-blue);
  margin-bottom: 30px;
  font-size: 22px;
}

#sidebar a {
  display: block;
  padding: 12px;
  border-radius: 8px;
  color: var(--text-light);
  text-decoration: none;
  margin-bottom: 8px;
  transition: 0.2s;
}

#sidebar a:hover {
  background: rgba(0,234,255,0.1);
  color: var(--neon-blue);
}

/* Mobile Sidebar Hidden */
#sidebar.mobile-hidden {
  transform: translateX(-100%);
  position: fixed;
  height: 100%;
  z-index: 1000;
}

/* Main Content */
#content {
  flex: 1;
  padding: 24px;
  overflow-y: auto;
}

/* Top Bar */
.topbar {
  display: none;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.hamburger {
  font-size: 26px;
  cursor: pointer;
  color: var(--neon-blue);
}

/* Cards */
.card {
  background: var(--panel-bg);
  padding: 20px;
  border-radius: 14px;
  margin-bottom: 20px;
  border: 1px solid rgba(0,234,255,0.2);
  box-shadow: 0 0 10px rgba(0,234,255,0.1);
}

.card h3 {
  margin-bottom: 12px;
  color: var(--neon-blue);
}

/* Balance */
.balance {
  font-size: 32px;
  font-weight: bold;
}

/* Inputs */
input, textarea, select {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  margin-bottom: 14px;
  background: #0e1422;
  border: 1px solid rgba(0,234,255,0.2);
  border-radius: 10px;
  color: var(--text-light);
  font-size: 15px;
}

/* Buttons */
.button {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-blue-strong));
  border: none;
  border-radius: 10px;
  font-weight: bold;
  color: #001018;
  cursor: pointer;
  margin-top: 10px;
  transition: 0.3s;
  font-size: 15px;
}

.button:hover {
  box-shadow: 0 0 18px rgba(0,234,255,0.5);
}

/* Hidden Phrase */
.hidden {
  filter: blur(8px);
  user-select: none;
  pointer-events: none;
}

/* Responsive */
@media (max-width: 900px) {
  #sidebar {
    position: fixed;
    height: 100%;
    z-index: 1000;
  }

  .topbar {
    display: flex;
  }

  #wrapper {
    flex-direction: column;
  }
}
</style>
</head>

<body>

<div id="wrapper">
  <div id="sidebar" class="mobile-hidden">
    <h2>MedorCoin</h2>
    <a href="#" onclick="showPage('dashboard')">Dashboard</a>
    <a href="#" onclick="showPage('send')">Send</a>
    <a href="#" onclick="showPage('receive')">Receive</a>
    <a href="#" onclick="showPage('history')">History</a>
    <a href="#" onclick="showPage('create')">Create Wallet</a>
    <a href="#" onclick="showPage('backup')">Backup</a>
    <a href="#" onclick="showPage('security')">Security</a>
    <a href="#" onclick="showPage('advanced')">Advanced</a>
  </div>

  <div id="content">

    <div class="topbar">
      <span class="hamburger" onclick="toggleSidebar()">☰</span>
      <span style="color: var(--neon-blue); font-weight: bold;">MedorCoin</span>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="page">
      <div class="card">
        <h3>Wallet Balance</h3>
        <div class="balance" id="balanceDisplay">0.000 MED</div>
      </div>
      <div class="card">
        <h3>Address</h3>
        <input type="text" id="dashboardAddress" readonly>
      </div>
    </div>

    <!-- Other pages (send, receive, history, backup, security, advanced) go here... -->
    <!-- Same structure as your original -->

  </div>
</div>

<script>
let wallet = null;

// Sidebar toggle
function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("mobile-hidden");
}

// Show a page
function showPage(id) {
  document.querySelectorAll(".page").forEach(p => p.style.display = "none");
  document.getElementById(id).style.display = "block";
  if (window.innerWidth < 900) toggleSidebar();
}

// Generate wallet
function generateWallet() {
  const phrase = Array(12).fill().map(() =>
    Math.random().toString(36).substring(2,5)
  ).join(" ");

  const privateKey = "0x" + Array(64).fill().map(() =>
    Math.floor(Math.random()*16).toString(16)
  ).join("");

  const address = "Mdc" + Math.random().toString(36).substring(2,34);

  wallet = {
    phrase: phrase,
    privateKey: privateKey,
    address: address
  };

  document.getElementById("dashboardAddress").value = address;

  // 💥 Auto redirect to dashboard
  showPage('dashboard');
  alert("Wallet Created! You are now on the Dashboard.");
}
</script>

</body>
</html>
