<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedorCoin - Welcome</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --bg: #0b1020; --surface: #0e1520; --accent: #ff8a00; --text: #e5e7eb;
      --muted: #9ca3af; --error: #e11d48; --success: #10b981; --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif;
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
      background-image: radial-gradient(circle at 50% 50%, rgba(255,138,0,0.05) 0%, transparent 80%);
    }
    .auth-card {
      background: var(--surface); border: 1px solid rgba(255,255,255,0.1);
      padding: 40px; border-radius: 16px; width: 100%; max-width: 420px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    .logo { font-size: 1.5rem; font-weight: 800; color: #fff; margin-bottom: 8px; text-align: center; }
    .kicker { font-size: 0.75rem; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; text-align: center; margin-bottom: 32px; }
    
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; }
    input {
      width: 100%; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1);
      padding: 14px; border-radius: var(--radius); color: #fff; font-size: 1rem;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: var(--accent); background: rgba(0,0,0,0.3); }
    
    /* Password Security Hint Box */
    .password-requirements {
      font-size: 0.7rem; color: var(--muted); margin-top: 10px;
      padding: 10px; background: rgba(0,0,0,0.15); border-radius: 8px;
    }
    .req { display: inline-block; margin-right: 8px; transition: color 0.3s; }
    .valid { color: var(--success); }
    .invalid { color: var(--error); }

    .btn {
      width: 100%; padding: 14px; border-radius: var(--radius); border: none;
      background: linear-gradient(135deg, #ffb84d, var(--accent));
      color: #000; font-weight: 700; font-size: 1rem; cursor: pointer;
      transition: transform 0.1s, opacity 0.2s; margin-top: 10px;
    }
    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }

    .status-msg { font-size: 0.85rem; padding: 12px; border-radius: 8px; margin-top: 20px; display: none; text-align: center; }
    .status-msg.err { display: block; background: rgba(225,29,72,0.1); color: var(--error); border: 1px solid rgba(225,29,72,0.2); }
    .status-msg.ok { display: block; background: rgba(16,185,129,0.1); color: var(--success); border: 1px solid rgba(16,185,129,0.2); }
  </style>
</head>
<body>

<div class="auth-card">
  <div class="logo">MEDORCOIN</div>
  <div class="kicker">Genesis Node Enrollment</div>

  <div style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 25px;">
    <div id="g_id_onload" data-client_id="YOUR_GOOGLE_ID" data-callback="onSocialAuth"></div>
    <div class="g_id_signin" data-type="standard" data-width="340"></div>
    <button class="btn" style="background: #fff; color: #000;" onclick="onSocialAuth({provider:'apple'})">Sign up with Apple</button>
  </div>

  <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin-bottom: 25px;">

  <form id="signup-form">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" required placeholder="name@domain.com">
    </div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" required placeholder="Node Alias">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" required placeholder="••••••••">
      <div class="password-requirements" id="pass-hints">
        <span class="req" id="r-len">• 8+ Chars</span>
        <span class="req" id="r-up">• Upper</span>
        <span class="req" id="r-num">• Number</span>
        <span class="req" id="r-sym">• Symbol</span>
      </div>
    </div>
    <button type="submit" class="btn" id="signup-btn">Create Account</button>
  </form>

  <div id="status" class="status-msg"></div>
  <p style="text-align: center; font-size: 0.8rem; margin-top: 20px; color: var(--muted);">
    Already have an account? <a href="login.html" style="color: var(--accent); text-decoration: none;">Login</a>
  </p>
</div>

<script>
(function() {
  const form = document.getElementById('signup-form');
  const passInput = document.getElementById('password');
  const statusEl = document.getElementById('status');
  const btn = document.getElementById('signup-btn');

  function showStatus(msg, type) {
    statusEl.textContent = msg;
    statusEl.className = `status-msg ${type}`;
  }

  // --- PASSWORD VALIDATION LOGIC ---
  passInput.addEventListener('input', () => {
    const val = passInput.value;
    document.getElementById('r-len').className = val.length >= 8 ? 'req valid' : 'req invalid';
    document.getElementById('r-up').className = /[A-Z]/.test(val) ? 'req valid' : 'req invalid';
    document.getElementById('r-num').className = /[0-9]/.test(val) ? 'req valid' : 'req invalid';
    document.getElementById('r-sym').className = /[^A-Za-z0-9]/.test(val) ? 'req valid' : 'req invalid';
  });

  // --- SOCIAL SIGNUP SYNC ---
  window.onSocialAuth = async (response) => {
    try {
      const res = await fetch('/api/auth/social-sync', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: response.credential, provider: response.provider || 'google' })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('medor_token', data.token);
        window.location.href = 'miners.html';
      }
    } catch (e) { showStatus("Social sync failed.", "err"); }
  };

  // --- MANUAL SIGNUP ---
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    btn.disabled = true;
    btn.textContent = "Processing...";
    showStatus("", "");

    const payload = {
      email: document.getElementById('email').value,
      username: document.getElementById('username').value,
      password: passInput.value
    };

    try {
      const res = await fetch('/api/auth/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const data = await res.json();

      if (res.ok) {
        // Automatically login the user after successful signup
        localStorage.setItem('medor_token', data.token);
        localStorage.setItem('medor_address', data.address);
        showStatus("Account created! Initializing mining node...", "ok");
        setTimeout(() => { window.location.href = 'miners.html'; }, 1500);
      } else {
        throw new Error(data.msg || "Signup Failed");
      }
    } catch (err) {
      showStatus(err.message, "err");
      btn.disabled = false;
      btn.textContent = "Create Account";
    }
  });
})();
</script>
</body>
</html>
