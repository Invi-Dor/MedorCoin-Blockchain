<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedorCoin Login</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: top;
    padding-top: 60px;
  }
  .container {
    background: #1e293b;
    padding: 40px;
    border-radius: 8px;
    width: 380px;
  }
  input {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    margin-bottom: 18px;
    border-radius: 5px;
    border: none;
  }
  button {
    width: 100%;
    padding: 12px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
  }
  button:hover {
    background: #1d4ed8;
  }
  .error {
    color: #f87171;
    font-size: 14px;
    margin-bottom: 12px;
  }
  .social-btn {
    background: #fff;
    color: #000;
    text-align: center;
    margin: 8px 0;
    display: block;
    border-radius: 6px;
    text-decoration: none;
    padding: 10px;
    font-weight: bold;
  }
  .social-btn img {
    vertical-align: middle;
    margin-right: 8px;
    width: 20px;
    height: 20px;
  }
</style>
</head>
<body>

<div class="container">

  <h2>MedorCoin Login</h2>

  <!-- Social Login Options -->
  <a class="social-btn" href="#" id="googleLogin">
    <img src="google-icon.png" alt="Google"> Login with Google
  </a>

  <a class="social-btn" href="#" id="appleLogin">
    <img src="apple-icon.png" alt="Apple"> Login with Apple
  </a>

  <hr style="border:1px solid #334155; margin:15px 0;">

  <form id="loginForm">
    <label>Email or Username</label>
    <input type="text" id="loginIdentifier" required placeholder="Your email or username">

    <label>Password</label>
    <input type="password" id="loginPassword" required placeholder="Your password">

    <div id="loginError" class="error"></div>

    <div style="margin-bottom:20px;">
      <input type="checkbox" id="loginCaptcha" required>
      <label for="loginCaptcha">I am not a robot</label>
    </div>

    <button type="submit">Log In</button>
  </form>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const identifier = document.getElementById("loginIdentifier").value.trim();
  const password = document.getElementById("loginPassword").value;
  const captchaChecked = document.getElementById("loginCaptcha").checked;
  const errorDiv = document.getElementById("loginError");

  if (!identifier || !password) {
    errorDiv.textContent = "Please fill in both fields.";
    return;
  }

  if (!captchaChecked) {
    errorDiv.textContent = "Please verify you are not a robot.";
    return;
  }

  // Example request — adapt to your backend endpoint
  try {
    const response = await fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ identifier, password })
    });

    if (response.ok) {
      const result = await response.json();
      // Store session token or user info
      localStorage.setItem("medorUser", JSON.stringify(result.user));
      window.location.href = "crypto-dashboard.html";
    } else {
      const error = await response.json();
      errorDiv.textContent = error.message || "Login failed.";
    }
  } catch (err) {
    errorDiv.textContent = "Network error, try again.";
  }
});

// OAuth stubs
document.getElementById("googleLogin").addEventListener("click", function() {
  alert("Google OAuth login not implemented.");
});
document.getElementById("appleLogin").addEventListener("click", function() {
  alert("Apple OAuth login not implemented.");
});
</script>

</body>
</html>
