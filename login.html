<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedorCoin - Welcome</title>
  <style>
    :root {
      --bg: #0b1020; --surface: #0e1520; --accent: #ff8a00; --text: #e5e7eb;
      --muted: #9ca3af; --error: #e11d48; --success: #10b981; --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif;
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
      background-image: radial-gradient(circle at 50% 50%, rgba(255,138,0,0.05) 0%, transparent 80%);
    }
    .auth-card {
      background: var(--surface); border: 1px solid rgba(255,255,255,0.1);
      padding: 40px; border-radius: 16px; width: 100%; max-width: 420px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    .logo { font-size: 1.5rem; font-weight: 800; color: #fff; margin-bottom: 8px; text-align: center; }
    .kicker { font-size: 0.75rem; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; text-align: center; margin-bottom: 32px; }
    
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; }
    input {
      width: 100%; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1);
      padding: 14px; border-radius: var(--radius); color: #fff; font-size: 1rem;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: var(--accent); background: rgba(0,0,0,0.3); }
    
    .btn {
      width: 100%; padding: 14px; border-radius: var(--radius); border: none;
      background: linear-gradient(135deg, #ffb84d, var(--accent));
      color: #000; font-weight: 700; font-size: 1rem; cursor: pointer;
      transition: transform 0.1s, opacity 0.2s; margin-top: 10px;
    }
    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }

    #twofa-section { display: none; }
    .status-msg { font-size: 0.85rem; padding: 12px; border-radius: 8px; margin-top: 20px; display: none; text-align: center; }
    .status-msg.err { display: block; background: rgba(225,29,72,0.1); color: var(--error); border: 1px solid rgba(225,29,72,0.2); }
    .status-msg.ok { display: block; background: rgba(16,185,129,0.1); color: var(--success); border: 1px solid rgba(16,185,129,0.2); }
  </style>
</head>
<body>

<div class="auth-card">
  <div class="logo">MEDORCOIN</div>
  <div class="kicker"></div>

  <form id="login-form">
    <div class="form-group">
      <label>Enter Your Email Address</label>
      <input type="email" id="email" required placeholder="name@domain.com" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Enter Your Password</label>
      <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
    </div>
    <button type="submit" class="btn" id="login-btn">Login</button>
  </form>

  <form id="twofa-section">
    <div class="form-group">
      <label>6-Digit Verification Code</label>
      <input type="text" id="2fa-code" maxlength="6" pattern="\d{6}" placeholder="000000" inputmode="numeric">
    </div>
    <button type="submit" class="btn" id="verify-btn">Confirm</button>
    <p style="text-align: center; font-size: 0.75rem; color: var(--muted); margin-top: 15px; cursor: pointer;" onclick="location.reload()">Back to login</p>
  </form>

  <div id="status" class="status-msg"></div>
</div>

<script>
(function() {
  const loginForm = document.getElementById('login-form');
  const twofaForm = document.getElementById('twofa-section');
  const statusEl = document.getElementById('status');
  
  let tempEmail = "";

  function showStatus(msg, type) {
    statusEl.textContent = msg;
    statusEl.className = `status-msg ${type}`;
  }

  // --- 1. INITIALIZE LOGIN ---
  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const btn = document.getElementById('login-btn');

    btn.disabled = true;
    btn.textContent = "Verifying...";
    showStatus("", "");

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (res.ok && data.msg === "2FA_SENT") {
        tempEmail = email;
        loginForm.style.display = 'none';
        twofaForm.style.display = 'block';
        showStatus("Verification code has been sent to your email.", "ok");
      } else {
        throw new Error(data.msg || "Authentication Failed");
      }
    } catch (err) {
      showStatus(err.message, "err");
      btn.disabled = false;
      btn.textContent = "Initialize Session";
    }
  });

  // --- 2. CONFIRM 2FA & ISSUE INDUSTRIAL TOKEN ---
  twofaForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const code = document.getElementById('2fa-code').value;
    const btn = document.getElementById('verify-btn');

    btn.disabled = true;
    btn.textContent = "Authorizing...";

    try {
      const res = await fetch('/api/2fa/confirm', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: tempEmail, code: code })
      });

      const data = await res.json();

      if (res.ok && data.token) {
        // GLOBAL LOG: Store critical identity fragments
        localStorage.setItem('medor_token', data.token);
        localStorage.setItem('medor_address', data.address);
        localStorage.setItem('medor_session_start', Date.now());

        showStatus("Access Granted. Handshaking with cluster...", "ok");
        
        // Final redirection to the mining dashboard
        setTimeout(() => { window.location.href = 'miners.html'; }, 1000);
      } else {
        throw new Error(data.msg || "Invalid Code");
      }
    } catch (err) {
      showStatus(err.message, "err");
      btn.disabled = false;
      btn.textContent = "Confirm Identity";
    }
  });

  // --- 3. AUTO-GUARD: Check for existing active session ---
  async function checkGlobalSession() {
    const token = localStorage.getItem('medor_token');
    if (!token) return;

    try {
      const res = await fetch('/api/auth/me', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.ok) window.location.href = 'miners.html';
    } catch (e) {
      localStorage.clear(); // Clear corrupt/expired state
    }
  }

  checkGlobalSession();
})();
</script>
</body>
</html>
