<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedorCoin | Log In</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --btn: #2563eb; --text: #f8fafc; }
  body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
  
  /* HEADER ARCHITECTURE */
  header { width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; background: rgba(15, 23, 42, 0.9); position: sticky; top: 0; z-index: 1000; }
  .logo { font-size: 22px; font-weight: 800; color: var(--accent); text-decoration: none; }
  .menu-icon { cursor: pointer; display: flex; flex-direction: column; gap: 5px; }
  .menu-icon div { width: 25px; height: 3px; background: white; border-radius: 2px; }
  
  /* DROPDOWN MENU */
  #nav-dropdown { display: none; position: absolute; top: 60px; right: 20px; background: var(--card); border: 1px solid #334155; border-radius: 8px; width: 200px; padding: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
  #nav-dropdown a { display: block; color: white; padding: 12px; text-decoration: none; font-size: 14px; border-radius: 4px; }
  #nav-dropdown a:hover { background: #334155; }

  /* LOGIN CONTAINER */
  .container { background: var(--card); padding: 35px; border-radius: 12px; width: 100%; max-width: 400px; margin-top: 60px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
  h2 { text-align: center; color: var(--accent); margin-bottom: 30px; }
  
  label { font-size: 13px; color: #94a3b8; display: block; margin-top: 20px; font-weight: 600; }
  input { width: 100%; padding: 12px; margin-top: 8px; border-radius: 6px; border: 1px solid #334155; background: var(--bg); color: white; box-sizing: border-box; font-size: 15px; }
  
  .captcha-box { display: flex; align-items: center; margin-top: 20px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 6px; }
  .captcha-box input { width: auto; margin-top: 0; margin-right: 12px; transform: scale(1.3); }

  button[type="submit"] { width: 100%; padding: 15px; background: var(--btn); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 700; margin-top: 25px; transition: 0.3s; }
  button[type="submit"]:hover { background: #1d4ed8; transform: translateY(-1px); }

  .social-container { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
  .apple-btn { background: #000; color: #fff; border: none; width: 100%; height: 45px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 600; cursor: pointer; }
  .apple-btn img { width: 18px; margin-right: 10px; filter: invert(1); }
  
  .error-msg { color: #f87171; font-size: 13px; margin-top: 15px; padding: 10px; background: rgba(248, 113, 113, 0.1); border-radius: 6px; display: none; text-align: center; }
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">MEDORCOIN</a>
  <div class="menu-icon" onclick="toggleMenu()">
    <div></div><div></div><div></div>
  </div>
  <div id="nav-dropdown">
    </div>
</header>

<div class="container">
  <h2>Account Login</h2>

  <div class="social-container">
    <div id="g_id_onload"
         data-client_id="650014694453-ud6jq7505nrh7ivm455p0hv86k9na6d5.apps.googleusercontent.com"
         data-context="signin"
         data-ux_mode="popup"
         data-callback="onGoogleLogin"
         data-auto_prompt="false">
    </div>
    <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline" data-text="signin_with" data-size="large" data-width="330"></div>

    <button class="apple-btn" onclick="onAppleLogin()">
      <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="">
      Login with Apple
    </button>
  </div>

  <hr style="border: 0; border-top: 1px solid #334155; margin-bottom: 20px;">

  <form id="loginForm">
    <label>Email or Username</label>
    <input type="text" id="identifier" required placeholder="Enter credentials">

    <label>Password</label>
    <input type="password" id="password" required placeholder="••••••••">

    <div class="captcha-box">
      <input type="checkbox" id="captcha" required>
      <label for="captcha" style="margin:0; color:white;">I am not a robot</label>
    </div>

    <div id="errorBox" class="error-msg"></div>
    <button type="submit" id="mainBtn">Log In to MedorCoin</button>
  </form>
</div>

<script>
// --- 1. SESSION & UI MANAGEMENT ---
function toggleMenu() {
  const dd = document.getElementById("nav-dropdown");
  dd.style.display = dd.style.display === "block" ? "none" : "block";
}

function updateUIForSession() {
  const user = JSON.parse(localStorage.getItem("medor_session"));
  const dropdown = document.getElementById("nav-dropdown");
  
  if (user) {
    dropdown.innerHTML = `
      <a href="crypto-dashboard.html"><b>Dashboard</b></a>
      <a href="wallet.html">My Wallet</a>
      <a href="settings.html">Settings</a>
      <hr style="border:0; border-top:1px solid #334155;">
      <a href="#" onclick="logout()" style="color:#f87171">Logout</a>
    `;
  } else {
    dropdown.innerHTML = `
      <a href="login.html">Login</a>
      <a href="signup.html">Create Account</a>
      <a href="about.html">About MedorCoin</a>
    `;
  }
}

function logout() {
  localStorage.removeItem("medor_session");
  window.location.href = "index.html";
}

// --- 2. THE "LANDING" REDIRECT LOGIC ---
async function landInDashboard(data) {
  // Save global user data from your server
  localStorage.setItem("medor_session", JSON.stringify(data.user));
  // Land on the dashboard
  window.location.href = "crypto-dashboard.html";
}

// --- 3. AUTHENTICATION HANDLERS ---
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("mainBtn");
  const err = document.getElementById("errorBox");
  err.style.display = "none";
  btn.innerText = "Verifying...";

  try {
    const res = await fetch("/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        identifier: document.getElementById("identifier").value,
        password: document.getElementById("password").value
      })
    });

    const data = await res.json();
    if (res.ok) {
      landInDashboard(data);
    } else {
      err.innerText = data.message || "Invalid credentials.";
      err.style.display = "block";
    }
  } catch (error) {
    err.innerText = "Network error: Verify your VPS connection.";
    err.style.display = "block";
  } finally {
    btn.innerText = "Log In to MedorCoin";
  }
});

function onGoogleLogin(response) {
  fetch("/api/auth/google-login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ token: response.credential })
  }).then(res => res.json()).then(data => landInDashboard(data));
}

function onAppleLogin() {
  // Add your registered Apple Redirect URI here
  window.location.href = "https://appleid.apple.com/auth/authorize?client_id=YOUR_ID&redirect_uri=https://medorcoin.org/dashboard&response_type=code id_token&scope=name email&response_mode=form_post";
}

// Init UI on load
updateUIForSession();
</script>
</body>
</html>
