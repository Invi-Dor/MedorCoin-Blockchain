server {
    listen 80;
    server_name medorcoin.invisible-m.com;
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name medorcoin.invisible-m.com;

    ssl_certificate /etc/letsencrypt/live/medorcoin.invisible-m.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/medorcoin.invisible-m.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/medorcoin.invisible-m.com/chain.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
        proxy_connect_timeout 90;
        proxy_redirect off;
    }

    limit_req_zone $binary_remote_addr zone=one:10m rate=60r/m;
    limit_req zone=one burst=20 nodelay;
}
