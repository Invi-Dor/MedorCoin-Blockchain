<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Premium Buy Now</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 24px; }
    .card { max-width: 600px; margin: 0 auto; padding: 16px; border: 1px solid #ddd; border-radius: 8px; }
    h1 { margin-top: 0; }
    .section { margin-bottom: 16px; }
    .options { display: flex; gap: 16px; flex-wrap: wrap; }
    .option { padding: 10px; border: 1px solid #ccc; border-radius: 6px; cursor: pointer; }
    .button { padding: 12px 20px; border: none; border-radius: 6px; background: #007bff; color: white; cursor: pointer; }
    #modal-backdrop { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
    #confirm-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 8px; max-width: 420px; width: 90%; }
  </style>
</head>
<body>
  <div class="card" aria-label="Premium Buy Now">
    <h1>Premium Plan</h1>
    <p>Price: <strong>$45 per month</strong></p>

    <div class="section" id="billing-section">
      <strong>Select billing period:</strong><br/>
      <label class="option">
        <input type="radio" name="billing" value="monthly" checked> $45 per month
      </label>
      <label class="option">
        <input type="radio" name="billing" value="yearly"> $297 per year
      </label>
    </div>

    <div class="section" id="payment-section">
      <strong>Choose payment method:</strong><br/>
      <label class="option">
        <input type="radio" name="method" value="eth" data-address="0xDEc0a1234567890abcdef1234567890abcdef1234"> Ethereum
      </label>
      <label class="option">
        <input type="radio" name="method" value="btc" data-address="1BoatSLRHtKNngkdXEeobR76b53LETtpyT"> Bitcoin
      </label>
      <label class="option">
        <input type="radio" name="method" value="bnb" data-address="bnb1exampleaddress0000000000000000"> BNB
      </label>
    </div>

    <button id="checkoutBtn" class="button" disabled>Checkout</button>
  </div>

  <div id="modal-backdrop" aria-hidden="true">
    <div id="confirm-modal" role="dialog" aria-label="Confirm Purchase">
      <p>Are you sure you are buying this?</p>
      <div style="display:flex; gap:8px; justify-content:flex-end;">
        <button id="modalNo" class="button" style="background:#6c757d">No</button>
        <button id="modalYes" class="button" style="background:#28a745">Yes</button>
      </div>
    </div>
  </div>

  <script src="premium-buy-now-backend.js" defer></script>
</body>
</html>
