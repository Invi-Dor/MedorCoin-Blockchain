<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MedorCoin - Liquidity Lock</title>
    <link rel="stylesheet" href="css/style.css"> <!-- Replace with your CSS file -->
    <style>
        .container { display: flex; }
        .sidebar { width: 250px; background: #f4f4f4; padding: 20px; height: 100vh; }
        .sidebar a { display: block; padding: 10px; text-decoration: none; color: #333; border-bottom: 1px solid #ddd; }
        .main-content { flex: 1; padding: 40px; }
        .input-group { margin-bottom: 15px; }
        input { width: 100%; padding: 10px; margin-top: 5px; }
        button { padding: 15px 30px; background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h3>Medor Locks</h3>
            <a href="liquidity-lock.html" style="background:#ddd;">💧 Liquidity Lock</a>
            <a href="token-lock.html">🪙 Token Lock</a>
            <a href="nft-lock.html">🖼️ NFT Lock</a>
            <a href="asset-lock.html">📦 Asset Lock</a>
            <a href="investing.html">💎 Investing</a>
        </div>
        <div class="main-content">
            <h1>Liquidity Locker</h1>
            <p>Standard flat fee: <strong>$45.00</strong></p>
            <div class="input-group">
                <label>LP Token Address</label>
                <input type="text" id="tokenAddress" placeholder="0x...">
            </div>
            <div class="input-group">
                <label>Amount to Lock</label>
                <input type="number" id="amount" placeholder="0.0">
            </div>
            <div class="input-group">
                <label>Unlock Date</label>
                <input type="datetime-local" id="unlockDate">
            </div>
            <button onclick="executeLock('Liquidity')">Lock Liquidity Now</button>
        </div>
    </div>
    <script src="https://jsdelivr.net"></script>
    <script src="js/lock-logic.js"></script>
</body>
</html>
