name: CI Build & Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  checks: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libssl-dev \
            libleveldb-dev \
            libsecp256k1-dev \
            nlohmann-json3-dev \
            libsnappy-dev \
            liblz4-dev \
            libzstd-dev \
            libbz2-dev \
            zlib1g-dev \
            libgtest-dev \
            lcov \
            gcovr

      - name: Configure
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_COVERAGE=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Coverage
        run: |
          gcovr -r . build \
            --html --html-details -o build/coverage.html \
            --xml -o build/coverage.xml \
            --fail-under-line 50

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: build/coverage.html
