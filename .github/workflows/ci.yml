name: CI Build & Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        use_system_deps: [OFF, ON]
        enable_evm: [ON, OFF]
        node-version: [20.x]

    steps:
      # -------------------------
      # Checkout repository
      # -------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -------------------------
      # Node.js setup
      # -------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install Node dependencies
        run: npm ci || npm install

      - name: Build & test Node backend
        run: |
          npm run build --if-present
          npm test --if-present

      # -------------------------
      # C/C++ Toolchain
      # -------------------------
      - name: Set up C/C++ toolchain
        uses: aminya/setup-cpp@v1
        with:
          compiler: latest
          cmake: true
          ninja: true
          gcovr: true

      - name: Install Ubuntu packages
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov

      # -------------------------
      # Configure CMake
      # -------------------------
      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_COVERAGE=ON \
            -DMEDOR_USE_SYSTEM_DEPS=${{ matrix.use_system_deps }} \
            -DMEDOR_ENABLE_EVM=${{ matrix.enable_evm }}

      # -------------------------
      # Build C++ project
      # -------------------------
      - name: Build
        run: cmake --build build --parallel

      # -------------------------
      # Run C++ tests
      # -------------------------
      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      # -------------------------
      # Coverage
      # -------------------------
      - name: Generate coverage
        run: |
          gcovr -r . build \
            --html --html-details -o build/coverage.html \
            --xml -o build/coverage.xml \
            --fail-under-line 70

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.use_system_deps }}-${{ matrix.enable_evm }}
          path: build/coverage.html
