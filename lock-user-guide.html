<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquidity Lock | MedorCoin Professional</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; background-color: #fffaf0; color: #333; margin: 0; }
        header { background-color: #d8bffb; color: #2b2b2b; display: flex; align-items: center; justify-content: space-between; padding: 15px 30px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-connect { background: #6b46c1; color: white; border: none; padding: 10px 22px; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-connect:hover { background: #553c9a; }
        
        .hero { background: linear-gradient(135deg, #d8bffb 0%, #f3e8ff 100%); padding: 50px 20px; text-align: center; border-bottom: 2px solid #b794f4; }
        .locker-container { max-width: 550px; margin: -50px auto 40px; background: white; padding: 35px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .locker-container h2 { color: #6b46c1; margin-top: 0; text-align: center; }
        
        input, select { width: 100%; padding: 14px; margin: 12px 0; border: 1px solid #cbd5e0; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        .btn-lock { width: 100%; background: #1890ff; color: white; border: none; padding: 16px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-lock:disabled { background: #cbd5e0; cursor: not-allowed; }
        
        #status { text-align: center; font-weight: bold; margin-top: 15px; font-size: 14px; }
        .fee-tag { font-size: 13px; color: #1890ff; text-align: center; margin-bottom: 10px; display: block; font-weight: bold; }
        
        main { padding: 40px 20px; max-width: 900px; margin: 0 auto; }
        .lock-item { background: white; padding: 15px; margin: 12px 0; border-radius: 10px; border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid #d8bffb; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center;">
        <img src="logo.png" alt="Logo" style="height:40px; margin-right:10px;">
        <span style="font-weight:bold; font-size:1.2em;">MedorCoin</span>
    </div>
    <nav><button id="walletBtn" class="btn-connect">Connect Wallet</button></nav>
</header>

<div class="hero">
    <h1>Permanent Liquidity Vault</h1>
    <p>Secure your LP tokens and build absolute investor trust.</p>
</div>

<div class="locker-container">
    <h2>Liquidity Locker</h2>
    <span id="feeDisplay" class="fee-tag">Fee: $45 USD (Dynamic Conversion)</span>
    
    <input type="text" id="tokenIn" placeholder="Medor / LP Token Address">
    <input type="number" id="amountIn" placeholder="Amount of LP to lock">
    <input type="datetime-local" id="dateIn">
    
    <button id="actionBtn" class="btn-lock" disabled>1. Connect Wallet to Start</button>
    <div id="status"></div>
</div>

<main>
    <div id="locksSection" style="display:none;">
        <h3>My Locked Liquidity</h3>
        <div id="locksList">Loading your secure vaults...</div>
    </div>
</main>

<script>
    const HUB_ADDR = "0xYourDeployedLockerAddress"; 
    const ADMIN_WALLET = "0xD81e7078bEE7ad3a313a74ED171E2941b7455f1D";
    const MEDOR_TOKEN = "0x9E2B2b7E871583D24838573177114E1567406856"; // Use your actual deployed MEDOR address

    const HUB_ABI = [
        "function getRequiredPayment() view returns (uint256)",
        "function createLock(address t, uint256 a, uint256 u, bool n) external payable",
        "function getUserLocks(address u) view returns (uint256[])",
        "function locks(uint256 i) view returns (address owner, address token, uint256 amountOrId, uint256 unlockTime, bool isNFT, bool active)",
        "function withdraw(uint256 i) external"
    ];
    const ERC20_ABI = ["function approve(address s, uint256 a) public", "function decimals() view returns (uint8)"];

    let signer, hub;

    document.getElementById('walletBtn').onclick = async () => {
        if (!window.ethereum) return alert("Install MetaMask");
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = provider.getSigner();
        hub = new ethers.Contract(HUB_ADDR, HUB_ABI, signer);
        
        const addr = await signer.getAddress();
        document.getElementById('walletBtn').innerText = addr.slice(0,6) + "..." + addr.slice(-4);
        
        // Fee check for current user
        updateFeeDisplay(addr);
        
        document.getElementById('actionBtn').disabled = false;
        document.getElementById('actionBtn').innerText = "2. Approve & Lock LP";
        document.getElementById('locksSection').style.display = 'block';
        fetchUserLocks();
    };

    async function updateFeeDisplay(user) {
        const tokenIn = document.getElementById('tokenIn').value;
        const isExempt = (user.toLowerCase() === ADMIN_WALLET.toLowerCase() || tokenIn.toLowerCase() === MEDOR_TOKEN.toLowerCase());
        
        if (isExempt) {
            document.getElementById('feeDisplay').innerText = "Fee Status: EXEMPT (FREE)";
            return 0;
        } else {
            const fee = await hub.getRequiredPayment();
            document.getElementById('feeDisplay').innerText = `Fee: ${ethers.utils.formatEther(fee)} Native ($45 USD)`;
            return fee;
        }
    }

    document.getElementById('actionBtn').onclick = async () => {
        const token = document.getElementById('tokenIn').value;
        const amount = document.getElementById('amountIn').value;
        const dateStr = document.getElementById('dateIn').value;
        const status = document.getElementById('status');

        if(!dateStr) return alert("Select an unlock date!");
        const unlockTS = Math.floor(new Date(dateStr).getTime() / 1000);
        
        const user = await signer.getAddress();
        const fee = await updateFeeDisplay(user);

        try {
            status.innerText = "Step 1: Approving LP Tokens...";
            status.style.color = "blue";
            const erc = new ethers.Contract(token, ERC20_ABI, signer);
            const dec = await erc.decimals();
            const parsedAmt = ethers.utils.parseUnits(amount, dec);
            
            await (await erc.approve(HUB_ADDR, parsedAmt)).wait();

            status.innerText = "Step 2: Securing Liquidity Vault...";
            const tx = await hub.createLock(token, parsedAmt, unlockTS, false, { value: fee });
            await tx.wait();
            
            status.innerText = "✅ Liquidity Successfully Locked!";
            status.style.color = "green";
            fetchUserLocks();
        } catch (e) {
            status.innerText = "❌ Error: " + e.message;
            status.style.color = "red";
        }
    };

    async function fetchUserLocks() {
        const list = document.getElementById('locksList');
        const user = await signer.getAddress();
        const ids = await hub.getUserLocks(user);
        let html = "";
        
        for(let id of ids) {
            const l = await hub.locks(id);
            if(!l.active) continue;
            const ready = (Date.now() / 1000) >= l.unlockTime.toNumber();
            html += `<div class="lock-item">
                <div><strong>ID #${id}</strong> - ${l.token.slice(0,10)}...<br><small>Unlock: ${new Date(l.unlockTime*1000).toLocaleString()}</small></div>
                <button style="width:auto; padding:8px 15px;" onclick="claim(${id})" ${!ready?'disabled':''}>${ready?'Claim LP':'Locked'}</button>
            </div>`;
        }
        list.innerHTML = html || "No liquidity locks found.";
    }

    window.claim = async (id) => {
        await (await hub.withdraw(id)).wait();
        fetchUserLocks();
    };
</script>
</body>
</html>
