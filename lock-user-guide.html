<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquidity Lock | MedorCoin Professional</title>
    <!-- Core Engine -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; background-color: #fffaf0; color: #333; margin: 0; padding: 0; }
        header { background-color: #d8bffb; color: #2b2b2b; display: flex; align-items: center; justify-content: space-between; padding: 15px 30px; position: sticky; top: 0; z-index: 1000; }
        .brand { display: flex; align-items: center; }
        .brand img { height: 40px; margin-right: 10px; }
        nav { display: flex; align-items: center; }
        .btn-connect { background: #6b46c1; color: white; border: none; padding: 10px 25px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        
        /* LOCKER INTERFACE */
        .lock-card { background: white; max-width: 500px; margin: 40px auto; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .lock-card h3 { color: #6b46c1; margin-top: 0; }
        .lock-card input, .lock-card select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e0; border-radius: 8px; box-sizing: border-box; }
        .btn-action { width: 100%; background: #1890ff; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-action:disabled { background: #ccc; cursor: not-allowed; }
        #status { font-size: 14px; text-align: center; margin-top: 10px; font-weight: bold; }
        
        main { padding: 40px 20px; max-width: 900px; margin: 0 auto; }
        .lock-item { background: #fff; border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #d8bffb; }
    </style>
</head>
<body>

<header>
    <div class="brand"><img src="logo.png" alt="Logo"><span>MedorCoin</span></div>
    <nav><button id="connectBtn" class="btn-connect">Connect Wallet</button></nav>
</header>

<div class="lock-card">
    <h3>Professional Liquidity Locker</h3>
    <p id="feeDisplay" style="color: #6b46c1; font-weight: bold;">Loading $45 USD conversion...</p>
    
    <label>LP Token / Asset Address</label>
    <input type="text" id="assetAddr" placeholder="0x...">
    
    <label>Amount to Lock</label>
    <input type="number" id="assetAmount" placeholder="0.00">
    
    <label>Set Unlock Date & Time</label>
    <input type="datetime-local" id="unlockDate">
    
    <label><input type="checkbox" id="isNFT"> This is an NFT (ERC721)</label>
    
    <button id="executeBtn" class="btn-action" disabled>1. Connect Wallet to Start</button>
    <p id="status"></p>
</div>

<main>
    <div id="userLocksArea" style="display:none;">
        <h2>My Active Lockups</h2>
        <div id="lockList">Fetching from blockchain...</div>
    </div>
    
    <!-- (Your existing informational sections remain here) -->
</main>

<script>
    // Price Feeds
    const PRICE_FEEDS = {
        1: "0x5f4eC3Df9cbd43714FE2740f5E3616155c5b8419", // ETH Mainnet
        56: "0x0567F2323251f0Aab15c8dFb1967E4E8A7D42aeW" // BSC Mainnet
    };

    const HUB_ADDRESS = "0xYourDeployedContractAddress"; 
    const HUB_ABI = [
        "function getRequiredPayment() view returns (uint256)",
        "function createLock(address t, uint256 a, uint256 u, bool n) external payable",
        "function getUserLocks(address u) view returns (uint256[])",
        "function locks(uint256 i) view returns (address owner, address token, uint256 amountOrId, uint256 unlockTime, bool isNFT, bool active)",
        "function withdraw(uint256 i) external"
    ];
    const ERC20_ABI = ["function approve(address s, uint256 a) public", "function decimals() view returns (uint8)"];

    let signer, hub;

    document.getElementById('connectBtn').onclick = async () => {
        if (!window.ethereum) return alert("Install MetaMask");
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = provider.getSigner();
        hub = new ethers.Contract(HUB_ADDRESS, HUB_ABI, signer);
        
        const net = await provider.getNetwork();
        const fee = await hub.getRequiredPayment();
        document.getElementById('feeDisplay').innerText = `Fee: ${ethers.utils.formatEther(fee)} ${net.chainId == 56 ? 'BNB' : 'ETH'} ($45 USD)`;
        
        document.getElementById('executeBtn').disabled = false;
        document.getElementById('executeBtn').innerText = "2. Approve & Lock Asset";
        document.getElementById('userLocksArea').style.display = 'block';
        loadLocks();
    };

    document.getElementById('executeBtn').onclick = async () => {
        const asset = document.getElementById('assetAddr').value;
        const amount = document.getElementById('assetAmount').value;
        const date = document.getElementById('unlockDate').value;
        const isNFT = document.getElementById('isNFT').checked;
        const status = document.getElementById('status');

        if(!date) return alert("Select an unlock date!");
        const unlock = Math.floor(new Date(date).getTime() / 1000);
        const fee = await hub.getRequiredPayment();

        try {
            status.innerText = "Processing Approval...";
            if(!isNFT) {
                const erc = new ethers.Contract(asset, ERC20_ABI, signer);
                const dec = await erc.decimals();
                await (await erc.approve(HUB_ADDRESS, ethers.utils.parseUnits(amount, dec))).wait();
            }
            status.innerText = "Finalizing $45 USD Secure Lock...";
            const tx = await hub.createLock(asset, amount, unlock, isNFT, { value: fee });
            await tx.wait();
            status.innerText = "✅ Asset Locked!";
            loadLocks();
        } catch (e) { status.innerText = "❌ Error: " + e.message; }
    };

    async function loadLocks() {
        const list = document.getElementById('lockList');
        const user = await signer.getAddress();
        const ids = await hub.getUserLocks(user);
        let html = "";
        for(let id of ids) {
            const l = await hub.locks(id);
            if(!l.active) continue;
            const ready = (Date.now() / 1000) >= l.unlockTime.toNumber();
            html += `<div class="lock-item">
                <div><strong>#${id}</strong> - ${l.token.slice(0,6)}...<br><small>Unlocks: ${new Date(l.unlockTime*1000).toLocaleString()}</small></div>
                <button onclick="withdraw(${id})" ${!ready?'disabled':''}>${ready?'Claim':'Locked'}</button>
            </div>`;
        }
        list.innerHTML = html || "No locks found.";
    }

    window.withdraw = async (id) => {
        const tx = await hub.withdraw(id);
        await tx.wait();
        loadLocks();
    };
</script>
</body>
</html>
