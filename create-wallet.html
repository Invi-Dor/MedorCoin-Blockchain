<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>MedorCoin — Create Wallet (Mobile 2026)</title>

<style>
:root{--bg:#faf9f6;--ink:#1f2937;--border:#e5e7eb;--success:#10b981;--danger:#ef4444;--purple:#8b5cf6}
body{font-family:system-ui,-apple-system,sans-serif;margin:0;padding:1rem;background:var(--bg);color:var(--ink);overflow-x:hidden}
.container{max-width:600px;margin:0 auto;background:#fff;border:1px solid var(--border);border-radius:1.5rem;padding:2rem;box-shadow:0 1rem 3rem rgba(0,0,0,0.1)}
label{font-weight:700;margin:1rem 0 .5rem 0;display:block}
input,textarea{width:100%;padding:1rem;border:2px solid var(--border);border-radius:1rem;font-family:monospace;font-size:.9rem}
.btn{width:100%;padding:1.5rem;margin:.75rem 0;border:none;border-radius:1rem;font-size:1.2rem;font-weight:700;cursor:pointer}
.create-btn{background:linear-gradient(135deg,var(--success),#059669);color:white}
.spinner{display:none;text-align:center;margin-top:1rem}
.loader{border:4px solid #ddd;border-top:4px solid var(--purple);border-radius:50%;width:32px;height:32px;animation:spin 1s linear infinite;margin:auto}
@keyframes spin{100%{transform:rotate(360deg)}}
#walletInfo{display:none}
</style>
</head>
<body>

<div class="container">
  <h2 style="text-align:center;color:var(--purple)">🆕 Create Wallet</h2>

  <div id="walletInfo">
    <label>🌐 Wallet Address:</label><input id="address" readonly>
    <label>🔑 Private Key (Encrypted):</label><input id="privateKey" readonly>
    <label>🗝️ Recovery Phrase:</label><textarea id="recoveryPhrase" readonly></textarea>
  </div>

  <button class="btn create-btn" id="generateBtn">🚀 Generate Wallet</button>

  <div class="spinner" id="loadingSpinner">
    <div class="loader"></div><p>Generating wallet securely…</p>
  </div>
</div>

<script>
// Generate random phrase
function randomPhrase() {
  const sample = ["abandon","ability","able","about","above","absent","absorb","abstract","absurd","abuse","access","accident"];
  return Array(12).fill().map(()=> sample[Math.floor(Math.random()*sample.length)]).join(" ");
}

// Derive encryption key from passphrase
async function deriveKey(passphrase, salt) {
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey("raw", enc.encode(passphrase), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    {name:"PBKDF2",salt,sIterations:150000,hash:"SHA-256"},
    baseKey,
    {name:"AES-GCM",length:256},
    false,
    ["encrypt"]
  );
}

// Encrypt private key
async function encryptData(text, passphrase) {
  const enc = new TextEncoder();
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(passphrase, salt);
  const encrypted = await crypto.subtle.encrypt({name:"AES-GCM",iv},key,enc.encode(text));
  return {
    ciphertext: btoa(String.fromCharCode(...new Uint8Array(encrypted))),
    iv: btoa(String.fromCharCode(...iv)),
    salt: btoa(String.fromCharCode(...salt))
  };
}

document.getElementById("generateBtn").addEventListener("click", async function(){
  const btn = this;
  const spinner = document.getElementById("loadingSpinner");
  btn.style.display="none";
  spinner.style.display="block";

  try {
    const phrase = randomPhrase();
    const privKey = "0x"+Array(64).fill().map(_=>Math.floor(Math.random()*16).toString(16)).join("");
    const address = "mc1"+Array(34).fill().map(_=>Math.floor(Math.random()*58).toString(58)).join("");

    // ask passphrase for encryption
    let pass = prompt("Enter a passphrase (min 8 chars)");
    if(!pass || pass.length < 8) {
      alert("Passphrase must be at least 8 characters");
      btn.style.display="block";
      spinner.style.display="none";
      return;
    }

    // encrypt
    const encrypted = await encryptData(privKey, pass);

    // Save encrypted wallet to localStorage
    const walletObj = {address, encrypted, phrase};
    localStorage.setItem("medorcoin_wallet", JSON.stringify(walletObj));
    localStorage.setItem("wallet_active","true");

    // Auto redirect to wallet.html
    window.location.href = "wallet.html";
  } catch (e) {
    alert("Failed to generate wallet");
    console.error(e);
    btn.style.display="block";
  } finally {
    spinner.style.display="none";
  }
});
</script>

</body>
</html>
