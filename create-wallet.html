<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>MedorCoin — Create Wallet (Mobile)</title>
<style>
:root{--bg:#faf9f6;--ink:#1f2937;--border:#e5e7eb;--success:#10b981;--purple:#8b5cf6}
body{font-family:system-ui,-apple-system,sans-serif;margin:0;padding:1rem;background:var(--bg);color:var(--ink);overflow-x:hidden}
.container{max-width:600px;margin:0 auto;background:#fff;border:1px solid var(--border);border-radius:1rem;padding:2rem;box-shadow:0 1rem 3rem rgba(0,0,0,.1)}
h2{text-align:center;color:var(--purple)}
label{display:block;font-weight:700;margin:1rem 0 .5rem 0}
input,textarea{width:100%;padding:1rem;border:2px solid var(--border);border-radius:1rem;font-family:monospace;font-size:.9rem}
.btn{width:100%;padding:1.5rem;margin:.75rem 0;border:none;border-radius:1rem;font-size:1.1rem;font-weight:700;cursor:pointer}
.generate-btn{background:linear-gradient(135deg,var(--success),#059669);color:white}
.spinner{display:none;text-align:center;margin-top:1rem}
.loader{border:4px solid #ddd;border-top:4px solid var(--purple);border-radius:50%;width:32px;height:32px;animation:spin 1s linear infinite;margin:auto}
@keyframes spin{100%{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="container">
  <h2>🆕 Create Wallet</h2>

  <div id="walletOutput" style="display:none">
    <label>🌐 Address:</label><input id="outAddress" readonly>
    <label>🗝️ Encrypted Private Key:</label><textarea id="outEncrypted" readonly></textarea>
    <label>🔐 Save Your Passphrase:</label><textarea id="outPassphrase" readonly></textarea>
  </div>

  <button class="btn generate-btn" id="generateBtn">🚀 Generate Wallet</button>

  <div class="spinner" id="loadingSpinner">
    <div class="loader"></div>
    <p>Generating and encrypting securely…</p>
  </div>
</div>

<script>
// AES‑GCM encryption helper (Web Crypto API)
async function deriveKey(passphrase, salt) {
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey("raw", enc.encode(passphrase), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    {name:"PBKDF2", salt, iterations:100000, hash:"SHA-256"},
    baseKey,
    {name:"AES-GCM", length:256},
    false,
    ["encrypt", "decrypt"]
  );
}

async function encryptAES(text, passphrase) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv   = crypto.getRandomValues(new Uint8Array(12));
  const key  = await deriveKey(passphrase, salt);
  const enc  = new TextEncoder().encode(text);
  const ciphertext = await crypto.subtle.encrypt({name:"AES-GCM", iv}, key, enc);

  return {
    salt: btoa(String.fromCharCode(...salt)),
    iv:   btoa(String.fromCharCode(...iv)),
    data: btoa(String.fromCharCode(...new Uint8Array(ciphertext)))
  };
}

// Simple mnemonic generator (placeholder)
function simpleMnemonic() {
  const words = ["abandon","ability","able","about","above","absent","absorb","abstract","absurd","abuse","access","accident"];
  return Array(12).fill().map(()=>words[Math.floor(Math.random()*words.length)]).join(" ");
}

document.getElementById("generateBtn").addEventListener("click", async () => {
  const btn     = document.getElementById("generateBtn");
  const spinner = document.getElementById("loadingSpinner");
  btn.style.display='none';
  spinner.style.display='block';

  try {
    const phrase = simpleMnemonic();
    const privKey = "0x"+Array(64).fill().map(()=>Math.floor(Math.random()*16).toString(16)).join("");
    const address = "mc1"+Array(34).fill().map(()=>Math.floor(Math.random()*58).toString(58)).join("");

    const pass = prompt("Enter a strong passphrase to encrypt your key (store it safely!)");
    if(!pass || pass.length < 8) {
      alert("Passphrase must be at least 8 characters");
      btn.style.display='block';
      spinner.style.display='none';
      return;
    }

    const encrypted = await encryptAES(privKey, pass);

    const wallet = {
      address,
      encryptedPrivateKey: encrypted,
      mnemonic: phrase
    };

    localStorage.setItem("medorcoin_wallet", JSON.stringify(wallet));
    localStorage.setItem("wallet_active", "true");

    window.location.href = "wallet.html";
  } catch(e) {
    alert("Failed to generate, try again");
    btn.style.display='block';
    console.error(e);
  }
});
</script>

</body>
</html>
