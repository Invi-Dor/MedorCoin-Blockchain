<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MedorCoin Service Hub</title>
    <script src="https://jsdelivr.net"></script>
    <!-- CSS link here -->
</head>
<body>
    <div id="app">
        <button id="cn">Connect Wallet</button>
        <div id="ui" style="display:none;">
            <p>Wallet: <span id="wa"></span> | Fee: <span id="fe"></span></p>
            
            <div id="form">
                <input type="text" id="tk" placeholder="Token Address">
                <input type="number" id="am" placeholder="Amount / ID">
                <input type="datetime-local" id="dt">
                <label><input type="checkbox" id="nf"> NFT</label>
                <button id="lk">Lock Asset</button>
            </div>

            <table border="1" style="margin-top:20px;">
                <thead>
                    <tr><th>ID</th><th>Token</th><th>Amount</th><th>Unlock</th><th>Action</th></tr>
                </thead>
                <tbody id="ls"></tbody>
            </table>
        </div>
    </div>

    <script>
        // Configuration - Do not expose source paths
        const ADDR = "0xYourDeployedContractAddress"; 
        const ABI = [
            "function flatFee() view returns (uint256)",
            "function nextLockId() view returns (uint256)",
            "function locks(uint256) view returns (address owner, address token, uint256 amountOrId, uint256 startTime, uint256 unlockTime, uint256 amountWithdrawn, bool isNFT, bool isVesting, bool active)",
            "function createLock(address t, uint256 a, uint256 u, bool n) external payable returns (uint256)",
            "function withdraw(uint256 i) external"
        ];
        const E_ABI = ["function approve(address s, uint256 a) public returns (bool)", "function decimals() view returns (uint8)"];

        let s, h;

        document.getElementById('cn').onclick = async () => {
            const p = new ethers.providers.Web3Provider(window.ethereum);
            await p.send("eth_requestAccounts", []);
            s = p.getSigner();
            h = new ethers.Contract(ADDR, ABI, s);
            
            document.getElementById('wa').innerText = await s.getAddress();
            document.getElementById('ui').style.display = 'block';
            document.getElementById('cn').style.display = 'none';
            
            const f = await h.flatFee();
            document.getElementById('fe').innerText = ethers.utils.formatEther(f);
            load();
        };

        document.getElementById('lk').onclick = async () => {
            const t = document.getElementById('tk').value;
            const v = document.getElementById('am').value;
            const d = Math.floor(new Date(document.getElementById('dt').value).getTime() / 1000);
            const n = document.getElementById('nf').checked;
            const f = await h.flatFee();

            try {
                if(!n) {
                    const e = new ethers.Contract(t, E_ABI, s);
                    const dec = await e.decimals();
                    const a = ethers.utils.parseUnits(v, dec);
                    await (await e.approve(ADDR, a)).wait();
                    await (await h.createLock(t, a, d, n, {value: f})).wait();
                } else {
                    await (await h.createLock(t, v, d, n, {value: f})).wait();
                }
                load();
            } catch (err) { alert(err.message); }
        };

        async function load() {
            const b = document.getElementById('ls');
            b.innerHTML = "Syncing...";
            const max = await h.nextLockId();
            const me = await s.getAddress();
            let htm = "";

            for(let i=0; i<max; i++) {
                const l = await h.locks(i);
                if(l.owner === me && l.active) {
                    const r = Date.now()/1000 > l.unlockTime.toNumber();
                    htm += `<tr>
                        <td>${i}</td>
                        <td>${l.token.slice(0,6)}</td>
                        <td>${ethers.utils.formatUnits(l.amountOrId, 18)}</td>
                        <td>${new Date(l.unlockTime*1000).toLocaleString()}</td>
                        <td><button onclick="wd(${i})" ${!r?'disabled':''}>Withdraw</button></td>
                    </tr>`;
                }
            }
            b.innerHTML = htm || "No locks found.";
        }

        window.wd = async (id) => {
            try {
                await (await h.withdraw(id)).wait();
                load();
            } catch (err) { alert(err.message); }
        };
    </script>
</body>
</html>
