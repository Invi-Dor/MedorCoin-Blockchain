<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedorCoin - Professional Locker</title>
    <!-- Core Library for Blockchain Connection -->
    <script src="https://jsdelivr.net"></script>
    <style>
        :root { --primary: #ff8a00; --dark: #0f1013; --card-bg: #15171b; --text: #f1f5f9; --border: #232630; }
        body { margin: 0; display: flex; background: var(--dark); color: var(--text); font-family: 'Inter', sans-serif; }
        
        /* Navigation Sidebar */
        .sidebar { width: 260px; background: #000; height: 100vh; padding: 20px; border-right: 1px solid var(--border); position: fixed; }
        .sidebar h2 { color: var(--primary); font-size: 1.2rem; }
        .sidebar a { display: block; color: #a3a3a3; padding: 12px; text-decoration: none; border-radius: 8px; margin-bottom: 5px; cursor: pointer; transition: 0.2s; }
        .sidebar a:hover, .sidebar a.active { background: var(--card-bg); color: white; }
        .sidebar a.active { border-left: 4px solid var(--primary); }

        /* Main Content Area */
        .main { margin-left: 260px; padding: 40px; width: 100%; }
        .lock-container { max-width: 600px; background: var(--card-bg); padding: 30px; border-radius: 20px; border: 1px solid var(--border); }
        .info-header { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 0.85rem; color: var(--muted); border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        
        input { width: 100%; padding: 14px; margin: 10px 0 20px 0; background: var(--dark); border: 1px solid var(--border); color: white; border-radius: 10px; }
        .btn-action { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; font-size: 1rem; }
        .btn-action:hover { opacity: 0.9; }

        table { width: 100%; margin-top: 40px; border-collapse: collapse; background: var(--card-bg); border-radius: 12px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: #1c2029; font-size: 0.8rem; text-transform: uppercase; color: var(--primary); }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>MedorCoin Hub</h2>
        <a onclick="setMode('liquidity')" id="m-liquidity" class="active">💧 Liquidity Lock</a>
        <a onclick="setMode('token')" id="m-token">🪙 Token Lock</a>
        <a onclick="m-nft" onclick="setMode('nft')" id="m-nft">🖼️ NFT Safe</a>
        <a onclick="setMode('asset')" id="m-asset">📦 Asset Lock</a>
        <a href="vesting.html">⏳ Vesting Schedules</a>
        <hr style="opacity:0.1; margin:20px 0;">
        <a href="more.html">🏠 Back to Dashboard</a>
    </div>

    <div class="main">
        <!-- Initial Connect Button -->
        <div id="connect-screen" style="text-align:center; padding-top:100px;">
            <h1>Locker Service</h1>
            <p>Connect your wallet to start securing your assets.</p>
            <button class="btn-action" onclick="connect()" style="max-width:260px;">Connect Wallet</button>
        </div>

        <!-- Dynamic Form -->
        <div id="ui-screen" style="display:none;">
            <div class="lock-container">
                <div class="info-header">
                    <span>Wallet: <b id="wa">...</b></span>
                    <span>Service Fee: <b id="fe">0.00</b> ETH</span>
                </div>

                <h1 id="title-text">Liquidity Locker</h1>
                
                <label>Contract Address</label>
                <input type="text" id="tk" placeholder="0x...">
                
                <label id="label-amount">Amount to Lock</label>
                <input type="number" id="am" placeholder="0.0">
                
                <label>Unlock Date</label>
                <input type="datetime-local" id="dt">

                <button class="btn-action" id="lk-btn" onclick="executeLock()">Confirm & Create Lock</button>
            </div>

            <h2>Your Locked Assets</h2>
            <table>
                <thead>
                    <tr><th>ID</th><th>Asset</th><th>Amount</th><th>Status</th><th>Action</th></tr>
                </thead>
                <tbody id="list-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        // REPLACE WITH YOUR ACTUAL CONTRACT ADDRESS
        const LOCKER_ADDR = "0xYourDeployedContractAddress"; 
        
        const LOCKER_ABI = [
            "function flatFee() view returns (uint256)",
            "function nextLockId() view returns (uint256)",
            "function locks(uint256) view returns (address owner, address token, uint256 amountOrId, uint256 startTime, uint256 unlockTime, uint256 amountWithdrawn, bool isNFT, bool isVesting, bool active)",
            "function createLock(address t, uint256 a, uint256 u, bool n) external payable returns (uint256)",
            "function withdraw(uint256 i) external"
        ];
        const TOKEN_ABI = ["function approve(address s, uint256 a) public returns (bool)", "function decimals() view returns (uint8)"];

        let signer, contract, currentMode = 'liquidity';

        // 1. DYNAMIC UI SWITCHER
        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
            document.getElementById('m-' + mode).classList.add('active');
            
            const titles = { 
                liquidity: "Liquidity Locker", 
                token: "Standard Token Lock", 
                nft: "NFT Safe Deposit", 
                asset: "Digital Asset Lock" 
            };
            document.getElementById('title-text').innerText = titles[mode];
            document.getElementById('label-amount').innerText = (mode === 'nft') ? "NFT Token ID" : "Amount to Lock";
        }

        // 2. BLOCKCHAIN CONNECTION
        async function connect() {
            if (!window.ethereum) return alert("MetaMask required");
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            signer = provider.getSigner();
            contract = new ethers.Contract(LOCKER_ADDR, LOCKER_ABI, signer);
            
            document.getElementById('wa').innerText = (await signer.getAddress()).slice(0,6) + "...";
            document.getElementById('ui-screen').style.display = 'block';
            document.getElementById('connect-screen').style.display = 'none';
            
            const fee = await contract.flatFee();
            document.getElementById('fe').innerText = ethers.utils.formatEther(fee);
            loadLocks();
        }

        // 3. EXECUTE LOCK (REAL TRANSACTION)
        async function executeLock() {
            const token = document.getElementById('tk').value;
            const amount = document.getElementById('am').value;
            const date = Math.floor(new Date(document.getElementById('dt').value).getTime() / 1000);
            const fee = await contract.flatFee();

            try {
                if(currentMode !== 'nft') {
                    const tokenContract = new ethers.Contract(token, TOKEN_ABI, signer);
                    const dec = await tokenContract.decimals();
                    const parsedAmount = ethers.utils.parseUnits(amount, dec);
                    
                    // Approval Step
                    const approveTx = await tokenContract.approve(LOCKER_ADDR, parsedAmount);
                    await approveTx.wait();
                    
                    // Lock Step
                    await (await contract.createLock(token, parsedAmount, date, false, {value: fee})).wait();
                } else {
                    // NFT Lock Step (uses Token ID directly)
                    await (await contract.createLock(token, amount, date, true, {value: fee})).wait();
                }
                alert("Lock successful!");
                loadLocks();
            } catch (err) { alert("Error: " + err.message); }
        }

        // 4. LOAD ACTIVE LOCKS
        async function loadLocks() {
            const list = document.getElementById('list-body');
            list.innerHTML = "<tr><td colspan='5'>Loading your locks...</td></tr>";
            const max = await contract.nextLockId();
            const me = await signer.getAddress();
            let html = "";

            for(let i=0; i<max; i++) {
                const l = await contract.locks(i);
                if(l.owner === me && l.active) {
                    const unlocked = Date.now()/1000 > l.unlockTime.toNumber();
                    html += `<tr>
                        <td>#${i}</td>
                        <td>${l.token.slice(0,10)}...</td>
                        <td>${ethers.utils.formatUnits(l.amountOrId, 18)}</td>
                        <td>${unlocked ? '🔓 Ready' : '🔒 Locked'}</td>
                        <td><button onclick="withdraw(${i})" ${!unlocked ? 'disabled':''}>Withdraw</button></td>
                    </tr>`;
                }
            }
            list.innerHTML = html || "<tr><td colspan='5'>No locks found.</td></tr>";
        }

        async function withdraw(id) {
            try {
                await (await contract.withdraw(id)).wait();
                loadLocks();
            } catch (err) { alert(err.message); }
        }
    </script>
</body>
</html>
