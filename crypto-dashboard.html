<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedorCoin Production Dashboard</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1189498572545023" crossorigin="anonymous"></script>
    
    <style>
        :root {
            --bg-dark: #0d1117; --bg-panel: #161b22; --border: #30363d;
            --text-primary: #c9d1d9; --accent: #58a6ff;
            --interactive-bg: #FFD580; --interactive-text: #333333;
        }

        body { background: var(--bg-dark); color: var(--text-primary); font-family: -apple-system, sans-serif; padding: 30px; margin: 0; }
        .header { display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 30px; }
        
        .dashboard-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--bg-panel); border: 1px solid var(--border); padding: 20px; border-radius: 6px; }
        .stat-card label { display: block; font-size: 11px; text-transform: uppercase; color: #8b949e; margin-bottom: 8px; }
        .stat-card span { font-family: monospace; font-size: 24px; font-weight: bold; color: var(--accent); }

        .controls-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        
        /* Interactive Blocks strictly using requested colors */
        .interactive-block { background-color: var(--interactive-bg); color: var(--interactive-text); padding: 25px; border-radius: 8px; }
        .interactive-block h3 { margin: 0 0 15px 0; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 10px; }
        
        .input-field { width: 100%; padding: 12px; background: #fff; border: 1px solid #bbb; border-radius: 4px; margin: 10px 0; box-sizing: border-box; font-family: monospace; }
        .btn-action { width: 100%; padding: 14px; background: var(--interactive-text); color: var(--interactive-bg); border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-action:hover { background: #000; }

        /* Hashrate Animation CSS */
        #hashrate-val { transition: transform 0.1s ease, color 0.1s ease; }

        /* Terminal CSS */
        .terminal-header { display: flex; justify-content: space-between; margin-top: 30px; margin-bottom: 5px; }
        .log-filters button { background: var(--bg-panel); color: #8b949e; border: 1px solid var(--border); cursor: pointer; padding: 4px 10px; font-size: 11px; }
        .log-filters button:hover, .log-filters button.active { color: #fff; border-color: #8b949e; }
        
        #node-log { background: #000; color: #00ff41; font-family: 'Consolas', monospace; padding: 15px; height: 200px; overflow-y: auto; border: 1px solid var(--border); font-size: 12px; }
        .log-entry.info { color: #58a6ff; }
        .log-entry.warn { color: #d29922; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1 style="margin:0;">MEDORCOIN <span style="font-weight: 300; color: #8b949e;">V6</span></h1>
            <small id="connection-indicator" style="color: #f85149;">DISCONNECTED</small>
        </div>
        <div style="display:flex; align-items:center; gap:15px;">
            <div id="g_id_onload" data-client_id="650014694453-ud6jq7505nrh7ivm455p0hv86k9na6d5.apps.googleusercontent.com" data-callback="handleAuth"></div>
            <div class="g_id_signin" data-type="standard"></div>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="stat-card"><label>Height</label><span id="stat-height">0</span></div>
        <div class="stat-card"><label>Difficulty</label><span id="stat-diff">0x00</span></div>
        <div class="stat-card"><label>Mempool</label><span id="stat-mempool">0</span></div>
        <div class="stat-card"><label>Peers</label><span id="stat-peers">0</span></div>
    </div>

    <div class="controls-grid">
        <div class="interactive-block">
            <h3>PRODUCTION MINER</h3>
            <div style="text-align:center; margin-bottom: 15px;">
                <label style="font-size: 11px; text-transform: uppercase;">Real-time Hashrate</label>
                <div id="hashrate-val" style="font-size: 32px; font-weight: bold; font-family: monospace;">0.00 H/s</div>
            </div>
            <input type="text" id="miner-address" class="input-field" value="1ukpJFf4uz3c3gDmM9JASZaGiV4STJEDfzp" readonly>
            <button id="miner-btn" class="btn-action" onclick="toggleMining()">Activate</button>
        </div>

        <div class="interactive-block">
            <h3>CLOUD BOOST</h3>
            <p style="font-size: 13px;">Inject +4.5 GH/s via AdSense verification.</p>
            <button id="boost-btn" class="btn-action" onclick="triggerAdBoost()">Watch Ad for 4.5 GH/s</button>
            <div id="boost-timer" style="display:none; text-align:center; font-size: 22px; font-weight: bold; margin: 15px 0;">
                ACTIVE: <span id="time-left">15:00</span>
            </div>
        </div>

        <div class="interactive-block">
            <h3>BROADCAST TX</h3>
            <input type="text" id="tx-recipient" class="input-field" placeholder="Recipient">
            <input type="number" id="tx-amount" class="input-field" placeholder="Satoshis">
            <button class="btn-action" onclick="pushTransaction()">Sign & Broadcast</button>
        </div>
    </div>

    <div class="terminal-header">
        <span style="font-size: 12px; font-weight: bold;">NODE TERMINAL</span>
        <div class="log-filters">
            <button class="active" onclick="filterLog('all')">ALL</button>
            <button onclick="filterLog('info')">INFO</button>
            <button onclick="filterLog('warn')">WARN</button>
        </div>
    </div>
    <div id="node-log"></div>

    <script>
        const WS_URL = "ws://localhost:8332";
        let socket = null;
        let miningActive = false;
        let currentFilter = 'all';

        function log(msg, level = 'info') {
            const terminal = document.getElementById('node-log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${level}`;
            const ts = new Date().toLocaleTimeString('en-GB', { hour12: false });
            entry.innerHTML = `<span style="color:#888">[${ts}]</span> [${level.toUpperCase()}] ${msg}`;
            
            if (currentFilter !== 'all' && currentFilter !== level) entry.style.display = 'none';
            
            terminal.appendChild(entry);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function filterLog(level) {
            currentFilter = level;
            const entries = document.querySelectorAll('.log-entry');
            entries.forEach(entry => {
                if (level === 'all' || entry.classList.contains(level)) {
                    entry.style.display = 'block';
                } else {
                    entry.style.display = 'none';
                }
            });
        }

        function initConnection() {
            socket = new WebSocket(WS_URL);
            socket.onopen = () => { document.getElementById('connection-indicator').innerText = "CONNECTED"; document.getElementById('connection-indicator').style.color = "#3fb950"; };
            
            socket.onmessage = (event) => {
                const packet = JSON.parse(event.data);
                if (packet.type === 'NODE_STATS') {
                    document.getElementById('stat-height').innerText = packet.height;
                    document.getElementById('stat-diff').innerText = packet.difficulty;
                    document.getElementById('stat-mempool').innerText = packet.mempool;
                    document.getElementById('stat-peers').innerText = packet.peers;
                } else if (packet.type === 'MINER_UPDATE') {
                    updateHashrate(packet.hashrate);
                } else if (packet.type === 'EVENT_LOG') {
                    log(packet.message, packet.level);
                }
            };
            
            socket.onclose = () => { document.getElementById('connection-indicator').innerText = "DISCONNECTED"; document.getElementById('connection-indicator').style.color = "#f85149"; setTimeout(initConnection, 3000); };
        }

        function updateHashrate(h) {
            const el = document.getElementById('hashrate-val');
            const oldVal = el.innerText;
            
            let newVal = "";
            if (h >= 1e9) newVal = (h / 1e9).toFixed(2) + " GH/s";
            else if (h >= 1e6) newVal = (h / 1e6).toFixed(2) + " MH/s";
            else newVal = h.toFixed(2) + " H/s";

            if (oldVal !== newVal) {
                el.innerText = newVal;
                // Animate update
                el.style.transform = 'scale(1.05)';
                el.style.color = '#fff';
                setTimeout(() => {
                    el.style.transform = 'scale(1)';
                    el.style.color = 'inherit';
                }, 150);
            }
        }

        function toggleMining() {
            const address = document.getElementById('miner-address').value;
            const btn = document.getElementById('miner-btn');
            if (!miningActive) {
                socket.send(JSON.stringify({ type: 'START_MINER', payload: { address } }));
                btn.innerText = "Stop Miner"; btn.style.background = "#f85149"; btn.style.color = "#fff";
                miningActive = true;
            } else {
                socket.send(JSON.stringify({ type: 'STOP_MINER' }));
                btn.innerText = "Activate"; btn.style.background = "var(--interactive-text)"; btn.style.color = "var(--interactive-bg)";
                miningActive = false;
                updateHashrate(0);
            }
        }

        function triggerAdBoost() {
            log("Waiting for AdSense Verification...", "info");
            setTimeout(() => {
                // Now perfectly matched to backend expectation: payload.amount
                socket.send(JSON.stringify({ type: 'APPLY_BOOST', payload: { amount: 4500000000 } }));
                document.getElementById('boost-btn').style.display = 'none';
                document.getElementById('boost-timer').style.display = 'block';
                // (Timer logic simplified here for brevity, you can retain the countdown interval)
            }, 1000);
        }

        function pushTransaction() {
            const to = document.getElementById('tx-recipient').value;
            const amount = document.getElementById('tx-amount').value;
            socket.send(JSON.stringify({ type: 'SUBMIT_TX', payload: { to, value: parseInt(amount), timestamp: Math.floor(Date.now()/1000) } }));
        }

        function handleAuth(response) { socket.send(JSON.stringify({ type: 'AUTH_SESSION', token: response.credential })); }

        initConnection();
    </script>
</body>
</html>
