<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Live Crypto Chart</title>
<style>
  body { margin: 0; font-family: Arial, sans-serif; background: #0f1013; color: #fff; }
  #controls { display: flex; gap: 12px; padding: 12px; background: #15171b; }
  select, button { padding: 8px 12px; border-radius: 6px; border: none; background: #232630; color: #fff; cursor: pointer; }
  #chart { width: 100%; height: 500px; margin-top: 10px; }
</style>
<script src="https://unpkg.com/lightweight-charts@3.4.0/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>

<div id="controls">
  <select id="pairSelect">
    <option value="btcusdt">BTC/USDT</option>
    <option value="ethusdt">ETH/USDT</option>
    <option value="bnbusdt">BNB/USDT</option>
    <option value="solusdt">SOL/USDT</option>
  </select>

  <select id="timeframeSelect">
    <option value="1m">1 min</option>
    <option value="5m">5 min</option>
    <option value="15m">15 min</option>
    <option value="30m">30 min</option>
    <option value="1h">1 hr</option>
    <option value="2h">2 hrs</option>
    <option value="5h">5 hrs</option>
    <option value="10h">10 hrs</option>
    <option value="24h">24 hrs</option>
    <option value="1M">1 mnth</option>
    <option value="all">All time</option>
  </select>

  <button onclick="connectWS()">Connect Live</button>
</div>

<div id="chart"></div>

<script>
const chartEl = document.getElementById('chart');

// Create chart
const chart = LightweightCharts.createChart(chartEl, {
  width: chartEl.clientWidth,
  height: 500,
  layout: { backgroundColor: '#000', textColor: '#fff' },
});

const candleSeries = chart.addCandlestickSeries();
const volumeSeries = chart.addHistogramSeries({
  priceFormat: { type: 'volume' },
  scaleMargins: { top: 0.8, bottom: 0 },
});

let ws; // WebSocket ref

function connectWS(){
  if (ws) ws.close();

  const pair = document.getElementById('pairSelect').value;
  const interval = document.getElementById('timeframeSelect').value;

  const stream = `${pair}@kline_${interval}`;
  const url = `wss://stream.binance.com:9443/ws/${stream}`;

  ws = new WebSocket(url);

  ws.onopen = () => console.log('WS connected to', stream);

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);

    // Binance sends candles under msg.k
    const candle = msg.k;
    const time = candle.t / 1000; // Unix seconds

    candleSeries.update({
      time,
      open: parseFloat(candle.o),
      high: parseFloat(candle.h),
      low: parseFloat(candle.l),
      close: parseFloat(candle.c)
    });

    volumeSeries.update({
      time,
      value: parseFloat(candle.v),
      color: candle.c > candle.o ? 'rgba(0, 150, 136, 0.7)' : 'rgba(255,82,82,0.7)'
    });
  };

  ws.onclose = () => console.log('WebSocket closed');
}
</script>

</body>
</html>
