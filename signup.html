<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedorCoin | Secure Sign Up</title>
  <style>
    :root { --primary: #2563eb; --error: #ef4444; --bg: #0f1b2a; --card: #1a2a45; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color:#fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .card { width: 100%; max-width: 420px; background: var(--card); padding: 35px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
    h2 { margin: 0 0 10px; color: var(--primary); }
    p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 25px; }
    label { display: block; margin-bottom: 6px; font-size: 0.85rem; color: #cbd5e1; }
    input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; transition: 0.2s; }
    input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2); }
    button { width: 100%; padding: 14px; font-weight: 700; border-radius: 6px; border: none; background: var(--primary); color: white; cursor: pointer; transition: 0.2s; }
    button:disabled { background: #334155; cursor: not-allowed; opacity: 0.6; }
    .status-box { padding: 12px; border-radius: 6px; font-size: 0.85rem; margin-bottom: 20px; display: none; line-height: 1.4; }
    .error { background: rgba(239, 68, 68, 0.1); color: var(--error); border: 1px solid var(--error); }
    .success { background: rgba(34, 197, 94, 0.1); color: #4ade80; border: 1px solid #22c55e; }
    .mnemonic-area { font-family: monospace; background: #000; padding: 10px; margin-top: 10px; border-radius: 4px; word-break: break-all; }
  </style>
</head>
<body>
  <div class="card" role="main">
    <h2>Sign Up</h2>
    <p>Create your MedorCoin sovereign identity.</p>
    
    <div id="statusBox" class="status-box" aria-live="polite"></div>

    <label for="username">Username (Alphanumeric)</label>
    <input id="username" type="text" placeholder="e.g. Satoshi77" autocomplete="username">
    
    <label for="password">Password (Min 8 chars)</label>
    <input id="password" type="password" placeholder="••••••••" autocomplete="new-password">
    
    <button id="signupBtn" disabled>Create Account</button>
  </div>

  <script>
    const signupBtn = document.getElementById('signupBtn');
    const statusBox = document.getElementById('statusBox');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');

    // Real-time Button Validation
    const validate = () => {
      const isAlphaNum = /^[a-z0-9]+$/i.test(usernameInput.value);
      const isReady = usernameInput.value.length >= 3 && isAlphaNum && passwordInput.value.length >= 8;
      signupBtn.disabled = !isReady;
    };

    [usernameInput, passwordInput].forEach(el => el.addEventListener('input', validate));

    signupBtn.addEventListener('click', async () => {
      statusBox.style.display = 'none';
      const username = usernameInput.value.trim();
      const password = passwordInput.value;

      try {
        signupBtn.innerText = 'Initializing Ledger...';
        signupBtn.disabled = true;

        const res = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (res.ok) {
          showStatus(`
            <strong>Success!</strong> Account created.<br>
            <small>Wallet Address: ${data.address}</small>
            <div class="mnemonic-area">Mnemonic: ${data.mnemonic}</div>
            <br><strong>Write this down!</strong> Redirecting to login in 10s...
          `, 'success');
          setTimeout(() => window.location.href = '/login.html', 10000);
        } else {
          showStatus(data.error || 'Server rejected request.', 'error');
          signupBtn.disabled = false;
        }
      } catch (err) {
        showStatus('Connection failed. Verify server is running on port 5000.', 'error');
        signupBtn.disabled = false;
      } finally {
        signupBtn.innerText = 'Create Account';
      }
    });

    function showStatus(msg, type) {
      statusBox.innerHTML = msg;
      statusBox.className = `status-box ${type}`;
      statusBox.style.display = 'block';
    }
  </script>
</body>
</html>
