<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedorCoin - Welcome</title>
  <style>
    :root {
      --bg: #0b1020; --surface: #0e1520; --accent: #ff8a00; --text: #e5e7eb;
      --muted: #9ca3af; --error: #e11d48; --success: #10b981; --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif;
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
    }
    .auth-card {
      background: var(--surface); border: 1px solid rgba(255,255,255,0.1);
      padding: 45px; border-radius: 18px; width: 100%; max-width: 420px;
    }
    .logo { font-size: 1.5rem; font-weight: 800; color: #fff; margin-bottom: 32px; text-align: center; }
    
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; }
    input {
      width: 100%; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1);
      padding: 14px; border-radius: var(--radius); color: #fff; font-size: 1rem;
    }
    
    .password-hints { font-size: 0.7rem; color: var(--muted); margin-top: 8px; display: flex; gap: 10px; }
    .valid { color: var(--success); }
    .invalid { color: var(--error); }

    .btn {
      width: 100%; padding: 14px; border-radius: var(--radius); border: none;
      background: linear-gradient(135deg, #ffb84d, var(--accent));
      color: #000; font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 10px;
    }
    .status-msg { font-size: 0.85rem; padding: 12px; border-radius: 8px; margin-top: 20px; display: none; text-align: center; }
    .status-msg.err { display: block; background: rgba(225,29,72,0.1); color: var(--error); }
    .status-msg.ok { display: block; background: rgba(16,185,129,0.1); color: var(--success); }
  </style>
</head>
<body>

<div class="auth-card">
  <div class="logo">MEDORCOIN</div>

  <form id="signup-form">
    <div class="form-group">
      <label>Enter Your Email Address</label>
      <input type="email" id="email" required placeholder="user@example.com">
    </div>
    <div class="form-group">
      <label>Choose Username</label>
      <input type="text" id="username" required placeholder="MiningAlias">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" required placeholder="••••••••">
      <div class="password-hints" id="pass-hints">
        <span id="r-len" class="invalid">You must use minimum 8+ chars</span>
        <span id="r-up" class="invalid">must contain at least 1 Uppercase letter</span>
        <span id="r-num" class="invalid">Number</span>
        <span id="r-sym" class="invalid">and a Symbol</span>
      </div>
    </div>
    <button type="submit" class="btn" id="signup-btn">Create Medor Account</button>
  </form>

  <div id="status" class="status-msg"></div>
  <p style="text-align: center; font-size: 0.8rem; margin-top: 20px; color: var(--muted);">
    Already registered? <a href="login.html" style="color: var(--accent);">Login here</a>
  </p>
</div>

<script>
const form = document.getElementById('signup-form');
const passInput = document.getElementById('password');
const btn = document.getElementById('signup-btn');
const statusEl = document.getElementById('status');

// Password Validator (Dynamic)
passInput.addEventListener('input', () => {
  const v = passInput.value;
  document.getElementById('r-len').className = v.length >= 8 ? 'valid' : 'invalid';
  document.getElementById('r-up').className = /[A-Z]/.test(v) ? 'valid' : 'invalid';
  document.getElementById('r-num').className = /[0-9]/.test(v) ? 'valid' : 'invalid';
  document.getElementById('r-sym').className = /[^A-Za-z0-9]/.test(v) ? 'valid' : 'invalid';
});

form.addEventListener('submit', async (e) => {
  btn.disabled = false;       // button stays clickable
  btn.textContent = "Signing Up..."; // optional feedback
});
  
  try {
    const res = await fetch('/api/auth/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value,
        username: document.getElementById('username').value,
        password: passInput.value
      })
    });

    const data = await res.json();
    if (res.ok) {
      statusEl.textContent = "Success! Start Mining...";
      statusEl.className = "status-msg ok";
      localStorage.setItem('medor_token', data.token);
      setTimeout(() => { window.location.href = 'miners.html'; }, 1500);
    } else {
      statusEl.textContent = data.msg || "Registration Failed.";
      statusEl.className = "status-msg err";
      btn.disabled = false;
      btn.textContent = "Create Your Account";
    }
  } catch (err) {
    statusEl.textContent = "connection lost.";
    statusEl.className = "status-msg err";
    btn.disabled = false;
    btn.textContent = "Create Your Account";
  }
});
</script>
</body>
</html>
