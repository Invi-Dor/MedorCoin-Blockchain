<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedorCoin | Industrial Sign Up</title>
<link rel="icon" href="medorcoin-logo.png">
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
<style>
  body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; padding: 40px 20px; }
  .container { background: #1e293b; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
  h2 { text-align: center; color: #38bdf8; margin-bottom: 25px; font-size: 22px; }
  label { font-size: 13px; color: #94a3b8; display: block; margin-top: 15px; }
  input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
  input:focus { border-color: #2563eb; outline: none; }
  button { width: 100%; padding: 14px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 25px; transition: 0.3s; }
  button:hover { background: #1d4ed8; transform: translateY(-1px); }
  .error { color: #f87171; font-size: 13px; margin-top: 10px; background: rgba(248, 113, 113, 0.1); padding: 8px; border-radius: 4px; display: none; }
  .social-group { display: flex; gap: 10px; margin-bottom: 20px; }
  .social-btn { flex: 1; background: #f8fafc; color: #1e293b; text-align: center; border-radius: 6px; text-decoration: none; padding: 10px; font-size: 14px; font-weight: 600; display: flex; align-items: center; justify-content: center; }
  .social-btn img { width: 18px; height: 18px; margin-right: 8px; }
  .requirements { font-size: 11px; color: #64748b; margin-top: 5px; line-height: 1.4; }
</style>
</head>
<body>

<div class="container">
  <h2>Create MedorCoin Account</h2>

  <div class="social-group">
    <a href="#" class="social-btn" onclick="handleSocial('google')">
      <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg"> Google
    </a>
    <a href="#" class="social-btn" onclick="handleSocial('apple')">
      <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg"> Apple
    </a>
  </div>

  <div style="text-align:center; color:#475569; font-size:12px; margin: 15px 0;">OR MANUAL SIGNUP</div>

  <form id="signupForm">
    <label>Email Address</label>
    <input type="email" id="email" required placeholder="name@email.com">

    <label>Username</label>
    <input type="text" id="username" required placeholder="Choose a username">

    <label>Password</label>
    <input type="password" id="password" required placeholder="••••••••">
    <div class="requirements">
      Min. 8 chars, 1 Uppercase, 1 Lowercase, 1 Number, 1 Special Symbol.
    </div>

    <label>Confirm Password</label>
    <input type="password" id="confirmPassword" required placeholder="••••••••">

    <div id="errorBox" class="error"></div>

    <button type="submit" id="submitBtn">Sign Up & Verify Email</button>
  </form>
</div>

<script>
// 1. Password Security Logic (8 Chars + Complexity)
function validatePassword(pw) {
  const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
  return regex.test(pw);
}

document.getElementById("signupForm").addEventListener("submit", async function(e) {
  e.preventDefault();
  const errorBox = document.getElementById("errorBox");
  const email = document.getElementById("email").value;
  const pw = document.getElementById("password").value;
  const confirm = document.getElementById("confirmPassword").value;
  
  errorBox.style.display = "none";

  // Match Check
  if(pw !== confirm) {
    showError("Passwords do not match.");
    return;
  }

  // Industrial Complexity Check
  if(!validatePassword(pw)) {
    showError("Password does not meet the 4 strict security requirements.");
    return;
  }

  // 2. Trigger verification code via Node.js Backend
  try {
    document.getElementById("submitBtn").innerText = "Sending Code...";
    const response = await fetch("https://your-api.medorcoin.org/auth/signup", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ email, username: document.getElementById("username").value, password: pw })
    });

    if(response.ok) {
      // Direct user to the verification code page
      window.location.href = "verify.html?email=" + encodeURIComponent(email);
    } else {
      showError("Account already exists or Server Error.");
    }
  } catch (err) {
    showError("Network Error. Check your connection.");
  } finally {
    document.getElementById("submitBtn").innerText = "Sign Up & Verify Email";
  }
});

function showError(msg) {
  const errorBox = document.getElementById("errorBox");
  errorBox.innerText = msg;
  errorBox.style.display = "block";
}

// 3. Real Social Login (Google/Apple)
async function handleSocial(providerType) {
  // In a real build, this uses Firebase 'signInWithPopup'
  alert(`Connecting to ${providerType} secure gateway...`);
  // Once confirmed, user bypasses OTP and goes straight to dashboard
}
</script>

</body>
</html>
