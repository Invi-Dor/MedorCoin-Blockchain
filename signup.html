<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedorCoin - SignUp</title>
  
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  
  <style>
    :root { 
      --bg: #0f172a; 
      --orange: #f97316; 
      --orange-hover: #ea580c; 
      --text: #f8fafc; 
      --input-bg: rgba(255, 255, 255, 0.05); 
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { 
      background: var(--bg); 
      color: var(--text); 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      min-height: 100vh; 
      padding: 20px;
    }

    .container { 
      width: 100%; 
      max-width: 400px; 
      text-align: center; 
    }

    .logo { 
      font-size: 2.5rem; 
      font-weight: 900; 
      letter-spacing: 4px; 
      margin-bottom: 30px; 
      text-transform: uppercase; 
      color: #fff;
    }

    .form-card { 
      background: rgba(30, 41, 59, 0.5); 
      padding: 30px; 
      border-radius: 24px; 
      border: 1px solid rgba(255, 255, 255, 0.1); 
      backdrop-filter: blur(10px); 
    }

    .form-group { margin-bottom: 20px; text-align: left; }

    label { 
      display: block; 
      font-size: 0.75rem; 
      margin-bottom: 8px; 
      color: #94a3b8; 
      padding-left: 5px; 
      font-weight: 600;
    }

    input { 
      width: 100%; 
      background: var(--input-bg); 
      border: 1px solid rgba(255, 255, 255, 0.1); 
      padding: 15px; 
      border-radius: 12px; 
      color: #fff; 
      outline: none; 
      font-size: 1rem;
    }

    input:focus { border-color: var(--orange); }

    /* Centered Orange Circle Button */
    .btn-container {
      display: flex;
      justify-content: center;
      margin: 30px 0;
    }

    .btn-orange-circle { 
      width: 110px; 
      height: 110px; 
      background: var(--orange); 
      color: white; 
      border: none; 
      border-radius: 50%; 
      font-weight: 800; 
      font-size: 0.9rem;
      cursor: pointer; 
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(249, 115, 22, 0.3);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.2;
    }

    .btn-orange-circle:hover { 
      background: var(--orange-hover); 
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(249, 115, 22, 0.5);
    }

    .btn-orange-circle:disabled {
      background: #475569;
      cursor: not-allowed;
    }

    .divider { 
      margin: 25px 0; 
      color: #64748b; 
      font-size: 0.7rem; 
      font-weight: 700;
      letter-spacing: 1px;
    }

    .social-btns { 
      display: flex; 
      justify-content: center; 
      margin-bottom: 10px; 
    }

    #status { 
      margin-top: 20px; 
      padding: 12px; 
      border-radius: 8px; 
      display: none; 
      font-size: 0.85rem; 
    }

    .err { display: block; color: #ef4444; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); }
    .ok { display: block; color: #22c55e; background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.2); }
  </style>
</head>
<body>

<div class="container">
  <div class="logo">MEDORCOIN</div>
  
  <div class="form-card">
    <form id="signup-form">
      <div class="form-group">
        <label>USERNAME</label>
        <input type="text" id="username" required placeholder="Pick a username">
      </div>
      <div class="form-group">
        <label>PASSWORD</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>

      <div class="btn-container">
        <button type="submit" class="btn-orange-circle" id="submit-btn">SIGN UP</button>
      </div>
    </form>

    <div class="divider">OR CONTINUE WITH</div>

    <div class="social-btns">
      <div id="g_id_onload" 
           data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com" 
           data-callback="handleSocialLogin">
      </div>
      <div class="g_id_signin" data-type="standard" data-theme="filled_blue"></div>
    </div>

    <div id="status"></div>
  </div>
</div>

<script>
// GENUINE BACKEND URL (PORT 5000)
const BACKEND_URL = 'https://super-duper-fishstick-7797j7vr7grw3xq5j-5000.app.github.dev';

const form = document.getElementById('signup-form');
const statusEl = document.getElementById('status');
const btn = document.getElementById('submit-btn');

// Regular Signup logic
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const payload = {
    username: document.getElementById('username').value,
    password: document.getElementById('password').value
  };
  await sendRequest('/signup', payload);
});

// Google Login Callback
async function handleSocialLogin(response) {
  await sendRequest('/google-signup', { token: response.credential });
}

async function sendRequest(endpoint, body) {
  btn.disabled = true;
  btn.textContent = "WAIT...";
  statusEl.className = "";
  statusEl.style.display = "block";
  statusEl.textContent = "Processing...";

  try {
    const res = await fetch(`${https://super-duper-fishstick-7797j7vr7grw3xq5j-5000.app.github.dev/}${endpoint}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    const data = await res.json();

    if (data.success) {
      localStorage.setItem('medor_address', data.address);
      statusEl.className = "ok";
      statusEl.textContent = "SUCCESS! Redirecting...";
      setTimeout(() => { window.location.href = 'miners.html'; }, 1000);
    } else {
      statusEl.className = "err";
      statusEl.textContent = data.error || "Signup failed.";
      btn.disabled = false;
      btn.textContent = "SIGN UP";
    }
  } catch (err) {
    statusEl.className = "err";
    statusEl.textContent = "OFFLINE: Ensure Port 5000 is set to PUBLIC in Codespaces.";
    btn.disabled = false;
    btn.textContent = "SIGN UP";
  }
}
</script>
</body>
</html>
