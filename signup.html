<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedorCoin - SignUp</title>
  <style>
    :root { 
      --bg: #0f172a; 
      --orange: #f97316; 
      --orange-hover: #ea580c; 
      --text: #f8fafc; 
      --input-bg: rgba(255, 255, 255, 0.05); 
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { 
      background: var(--bg); 
      color: var(--text); 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      display: flex; 
      flex-direction: column;
      align-items: center; 
      justify-content: center; 
      min-height: 100vh; 
      padding: 20px;
    }

    /* Professional Circle Logo Alignment */
    .header-logo {
      width: 140px;
      height: 140px;
      background: var(--orange);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      margin-bottom: 30px;
      box-shadow: 0 0 30px rgba(249, 115, 22, 0.2);
    }

    .logo-text {
      font-size: 1.1rem;
      font-weight: 900;
      line-height: 1.1;
      color: #fff;
      text-transform: uppercase;
    }

    .container { width: 100%; max-width: 400px; }

    .form-card { 
      background: rgba(30, 41, 59, 0.5); 
      padding: 30px; 
      border-radius: 24px; 
      border: 1px solid rgba(255, 255, 255, 0.1); 
      backdrop-filter: blur(10px); 
    }

    .form-group { margin-bottom: 15px; text-align: left; }

    label { 
      display: block; 
      font-size: 0.7rem; 
      margin-bottom: 6px; 
      color: #94a3b8; 
      font-weight: 700;
      letter-spacing: 1px;
    }

    input { 
      width: 100%; 
      background: var(--input-bg); 
      border: 1px solid rgba(255, 255, 255, 0.1); 
      padding: 12px; 
      border-radius: 10px; 
      color: #fff; 
      outline: none; 
      font-size: 0.95rem;
    }

    input:focus { border-color: var(--orange); }

    .captcha-box {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 5px;
    }

    .captcha-question {
      background: #1e293b;
      padding: 10px;
      border-radius: 8px;
      font-weight: bold;
      min-width: 80px;
      text-align: center;
      border: 1px solid var(--orange);
    }

    .btn-container {
      display: flex;
      justify-content: center;
      margin-top: 25px;
    }

    .btn-orange-circle { 
      width: 100px; 
      height: 100px; 
      background: var(--orange); 
      color: white; 
      border: none; 
      border-radius: 50%; 
      font-weight: 800; 
      font-size: 0.85rem;
      cursor: pointer; 
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 10px;
    }

    .btn-orange-circle:hover { 
      background: var(--orange-hover); 
      transform: scale(1.05); 
    }

    #status { 
      margin-top: 15px; 
      padding: 10px; 
      border-radius: 8px; 
      display: none; 
      font-size: 0.8rem; 
      text-align: center;
    }

    .err { color: #ef4444; background: rgba(239, 68, 68, 0.1); display: block !important; }
    .ok { color: #22c55e; background: rgba(34, 197, 94, 0.1); display: block !important; }
  </style>
</head>
<body>

<div class="header-logo">
  <div class="logo-text">MEDOR<br>COIN<br>MINING</div>
</div>

<div class="container">
  <div class="form-card">
    <form id="signup-form">
      <div class="form-group">
        <label>USERNAME</label>
        <input type="text" id="username" required placeholder="Username">
      </div>
      <div class="form-group">
        <label>CHOOSE PASSWORD</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>
      <div class="form-group">
        <label>CONFIRM PASSWORD</label>
        <input type="password" id="confirm_password" required placeholder="••••••••">
      </div>

      <div class="form-group">
        <label>VERIFY CAPTCHA</label>
        <div class="captcha-box">
          <div id="captcha-display" class="captcha-question"></div>
          <input type="number" id="captcha-input" required placeholder="Result">
        </div>
      </div>

      <div class="btn-container">
        <button type="submit" class="btn-orange-circle" id="submit-btn">SIGN<br>UP</button>
      </div>
    </form>
    <div id="status"></div>
  </div>
</div>

<script>
const BACKEND_URL = 'https://super-duper-fishstick-7797j7vr7grw3xq5j-5000.app.github.dev';
let captchaResult = 0;

function generateCaptcha() {
  const n1 = Math.floor(Math.random() * 10) + 1;
  const n2 = Math.floor(Math.random() * 10) + 1;
  captchaResult = n1 + n2;
  document.getElementById('captcha-display').textContent = `${n1} + ${n2} = ?`;
}

// Initialize Captcha
generateCaptcha();

const form = document.getElementById('signup-form');
const statusEl = document.getElementById('status');
const btn = document.getElementById('submit-btn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const user = document.getElementById('username').value;
  const pass = document.getElementById('password').value;
  const confirm = document.getElementById('confirm_password').value;
  const captcha = parseInt(document.getElementById('captcha-input').value);

  // Validation
  if (pass !== confirm) {
    showStatus("Passwords do not match.", "err");
    return;
  }
  if (captcha !== captchaResult) {
    showStatus("Incorrect CAPTCHA.", "err");
    generateCaptcha();
    return;
  }

  btn.disabled = true;
  btn.textContent = "WAIT...";
  
  try {
    const res = await fetch(`${BACKEND_URL}/signup`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: user, password: pass })
    });

    const data = await res.json();

    if (data.success) {
      showStatus("SUCCESS! Redirecting...", "ok");
      setTimeout(() => { window.location.href = 'miners.html'; }, 1500);
    } else {
      showStatus(data.error || "Signup failed.", "err");
      btn.disabled = false;
      btn.innerHTML = "SIGN<br>UP";
      generateCaptcha();
    }
  } catch (err) {
    showStatus("OFFLINE: Check Port 5000 Visibility.", "err");
    btn.disabled = false;
    btn.innerHTML = "SIGN<br>UP";
  }
});

function showStatus(msg, type) {
  statusEl.textContent = msg;
  statusEl.className = type;
  statusEl.style.display = "block";
}
</script>
</body>
</html>
