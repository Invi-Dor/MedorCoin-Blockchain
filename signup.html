<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedorCoin - Sign Up</title>
  <style>
    :root {
      --bg: #E0F7FF; --surface: #0e1520; --accent: #0A0A0A; 
      --text: #F3EAD2; --muted: #cbd5e1; 
      --error: #e11d48; --success: #10b981; --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif;
      display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;
    }
    .auth-card {
      background: var(--surface); border: 1px solid rgba(255,255,255,0.1);
      padding: 40px; border-radius: 16px; width: 100%; max-width: 420px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    .logo { font-size: 1.5rem; font-weight: 800; color: #fff; margin-bottom: 24px; text-align: center; letter-spacing: 1px; }
    
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 0.85rem; color: #f8fafc; margin-bottom: 8px; font-weight: 500; }
    
    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.15);
      padding: 14px; border-radius: var(--radius); color: #fff; font-size: 1rem;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: #64748b; }
    
    .password-hints { font-size: 0.75rem; color: var(--muted); margin-top: 8px; display: flex; gap: 10px; flex-wrap: wrap; }
    .valid { color: var(--success); font-weight: bold; }
    .invalid { color: var(--error); }

    .btn {
      width: 100%; padding: 14px; border-radius: var(--radius); border: none;
      background: linear-gradient(135deg, #cbd5e1, var(--accent));
      color: #fff; font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 10px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    
    .status-msg { font-size: 0.85rem; padding: 12px; border-radius: 8px; margin-top: 20px; display: none; text-align: center; }
    .status-msg.err { display: block; background: rgba(225,29,72,0.1); color: var(--error); border: 1px solid rgba(225,29,72,0.3); }
    .status-msg.ok { display: block; background: rgba(16,185,129,0.1); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
  </style>
</head>
<body>

<div class="auth-card">
  <div class="logo">MEDORCOIN</div>

  <form id="signup-form">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" required placeholder="miner@domain.com">
    </div>
    
    <div class="form-group">
      <label>Choose Username</label>
      <input type="text" id="username" required placeholder="MiningAlias">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" required placeholder="••••••••">
      <div class="password-hints" id="pass-hints">
        <span id="r-len" class="invalid">8+ chars</span>
        <span id="r-up" class="invalid">Upper</span>
        <span id="r-num" class="invalid">Num</span>
        <span id="r-sym" class="invalid">Sym</span>
      </div>
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirm-password" required placeholder="••••••••">
      <div class="password-hints" id="confirm-pass-hints">
        <span id="r-match" class="invalid">Must match</span>
      </div>
    </div>

    <button type="submit" class="btn" id="signup-btn">Create Account</button>
    <div id="status" class="status-msg"></div>
  </form>
</div>

<script>
const form = document.getElementById('signup-form');
const passInput = document.getElementById('password');
const confirmPassInput = document.getElementById('confirm-password');
const btn = document.getElementById('signup-btn');
const statusEl = document.getElementById('status');
const matchHint = document.getElementById('r-match');

// Real-time password UI
passInput.addEventListener('input', () => {
  const v = passInput.value;
  document.getElementById('r-len').className = v.length >= 8 ? 'valid' : 'invalid';
  document.getElementById('r-up').className = /[A-Z]/.test(v) ? 'valid' : 'invalid';
  document.getElementById('r-num').className = /[0-9]/.test(v) ? 'valid' : 'invalid';
  document.getElementById('r-sym').className = /[^A-Za-z0-9]/.test(v) ? 'valid' : 'invalid';
  validateMatch();
});

confirmPassInput.addEventListener('input', validateMatch);

function validateMatch() {
  if (confirmPassInput.value.length > 0) {
    const isMatch = passInput.value === confirmPassInput.value;
    matchHint.className = isMatch ? 'valid' : 'invalid';
    matchHint.textContent = isMatch ? 'Passwords match' : 'Must match';
  } else {
    matchHint.className = 'invalid';
    matchHint.textContent = 'Must match';
  }
}

form.addEventListener('submit', async (e) => {
  e.preventDefault(); 
  
  if (passInput.value !== confirmPassInput.value) {
    statusEl.textContent = "Passwords do not match.";
    statusEl.className = "status-msg err";
    return;
  }
  
  btn.disabled = true; 
  btn.textContent = "Creating Account...";
  statusEl.className = "status-msg"; 
  statusEl.textContent = "";

  let isSuccess = false;

  try {
    const response = await fetch('/api/auth/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value,
        username: document.getElementById('username').value,
        password: passInput.value
      })
    });

    const data = await response.json(); 

    if (response.ok) {
      isSuccess = true;
      statusEl.textContent = "Account created! Routing to dashboard...";
      statusEl.className = "status-msg ok";
      
      localStorage.setItem('medor_token', data.token);
      localStorage.setItem('medor_address', data.address);
      
      // Instantly push them to the dashboard to claim speed/free money
      setTimeout(() => {
        window.location.href = 'miners.html'; 
      }, 1000);
    } else {
      statusEl.textContent = data.msg || "Registration failed.";
      statusEl.className = "status-msg err";
    }
  } catch (err) {
    console.error("[FETCH ERROR]", err);
    statusEl.textContent = "Server offline. Ensure the API route is running.";
    statusEl.className = "status-msg err";
  } finally {
    if (!isSuccess) {
      btn.disabled = false; 
      btn.textContent = "Create Account";
    }
  }
});
</script>
</body>
</html>
