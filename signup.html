<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedorCoin - SignUp</title>
  <style>
    :root {
      --bg: #E0F7FF; --surface: #0e1520; --accent: #0A0A0A; 
      --text: #F3EAD2; --error: #e11d48; --success: #10b981; --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif;
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
    }
    .auth-card {
      background: var(--surface); border: 1px solid rgba(255,255,255,0.1);
      padding: 40px; border-radius: 16px; width: 100%; max-width: 400px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    .logo { font-size: 1.5rem; font-weight: 800; color: #fff; margin-bottom: 24px; text-align: center; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-size: 0.8rem; color: #f8fafc; margin-bottom: 5px; }
    input {
      width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.15);
      padding: 12px; border-radius: var(--radius); color: #fff; font-size: 1rem;
    }
    .btn {
      width: 100%; padding: 14px; border-radius: var(--radius); border: none;
      background: linear-gradient(135deg, #cbd5e1, var(--accent));
      color: #fff; font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 15px;
    }
    .btn:disabled { opacity: 0.5; }
    .status-msg { font-size: 0.85rem; padding: 10px; border-radius: 8px; margin-top: 15px; display: none; text-align: center; }
    .status-msg.err { display: block; background: rgba(225,29,72,0.1); color: var(--error); }
  </style>
</head>
<body>

<div class="auth-card">
  <div class="logo">MEDORCOIN</div>
  <form id="signup-form">
    <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
    <div class="form-group"><label>Username</label><input type="text" id="username" required></div>
    <div class="form-group"><label>Password</label><input type="password" id="password" required></div>
    <div class="form-group"><label>Confirm Password</label><input type="password" id="confirm" required></div>
    
    <button type="submit" class="btn" id="signup-btn">Create Account</button>
    <div id="status" class="status-msg"></div>
  </form>
</div>

<script>
document.getElementById('signup-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('signup-btn');
  const status = document.getElementById('status');
  const pass = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;

  if (pass !== confirm) {
    status.textContent = "Passwords do not match.";
    status.className = "status-msg err";
    return;
  }

  btn.disabled = true;
  btn.textContent = "Signing Up...";

  try {
    const res = await fetch('/api/auth/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value,
        username: document.getElementById('username').value,
        password: pass
      })
    });

    const data = await res.json();
    if (res.ok) {
      // SAVE SESSION AND JUMP STRAIGHT TO MINERS
      localStorage.setItem('medor_token', data.token);
      localStorage.setItem('medor_address', data.address);
      window.location.replace('miners.html'); 
    } else {
      throw new Error(data.msg || "Signup failed");
    }
  } catch (err) {
    status.textContent = err.message;
    status.className = "status-msg err";
    btn.disabled = false;
    btn.textContent = "Create Account";
  }
});
</script>
</body>
</html>
