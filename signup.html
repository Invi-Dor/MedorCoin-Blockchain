<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | MedorCoin Explorer</title>
    <!-- hCaptcha Anti-Bot -->
    <script src="https://hcaptcha.com" async defer></script>
    <style>
        body { font-family: "Helvetica Neue", Arial, sans-serif; background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { background: #fff; width: 100%; max-width: 440px; padding: 35px; border-radius: 8px; border: 1px solid #e7eaf3; box-shadow: 0 0.5rem 1.2rem rgba(189,197,209,.15); }
        .header h1 { font-size: 1.5rem; text-align: center; margin-bottom: 25px; color: #1e2022; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; color: #4b5563; }
        input { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        input:focus { outline: none; border-color: #3498db; }
        .h-captcha { margin: 20px 0; display: flex; justify-content: center; }
        .btn-reg { width: 100%; padding: 14px; background: #3498db; color: #fff; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-reg:hover { background: #2980b9; }
        .error { color: #dc3545; font-size: 0.85rem; margin-top: 10px; display: none; text-align: center; padding: 10px; background: #fff5f5; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>Create Account</h1></div>
    <form id="signupForm">
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" required placeholder="Enter username">
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" required placeholder="Enter email address">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" required placeholder="Min 12 chars, 1 uppercase, 1 number">
        </div>

        <div class="h-captcha" data-sitekey="YOUR_HCAPTCHA_SITE_KEY"></div>

        <div id="errMsg" class="error"></div>
        <button type="submit" class="btn-reg">Register Account</button>
    </form>
</div>

<script>
    let csrfToken = null;
    const API_BASE = "https://medorcoin.org"; // Ensure this matches your node.cjs host

    // 1. Fetch CSRF token on page load
    async function initSecurity() {
        try {
            const res = await fetch(`${API_BASE}/csrf-token`);
            const data = await res.json();
            csrfToken = data.csrfToken;
        } catch (e) {
            console.error("Security handshake failed.");
        }
    }
    initSecurity();

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errDiv = document.getElementById('errMsg');
        errDiv.style.display = 'none';

        const captchaToken = hcaptcha.getResponse();
        if (!captchaToken) {
            errDiv.innerText = "Please complete the Captcha.";
            errDiv.style.display = 'block';
            return;
        }

        const payload = {
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            captchaToken: captchaToken
        };

        try {
            const response = await fetch(`${API_BASE}/signup`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-CSRF-Token': csrfToken // 2. Pass the CSRF token to the backend
                },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (data.success) {
                // 3. Store the claimId in sessionStorage to keep it out of the URL
                sessionStorage.setItem('medor_claim_id', data.claimId);
                // 4. Redirect to verify.html with only the public address
                window.location.href = `verify.html?address=${data.address}`;
            } else {
                errDiv.innerText = data.error || "Signup failed.";
                errDiv.style.display = 'block';
                hcaptcha.reset(); 
            }
        } catch (err) {
            errDiv.innerText = "Connection failed. Check if backend is running.";
            errDiv.style.display = 'block';
        }
    });
</script>
</body>
</html>
