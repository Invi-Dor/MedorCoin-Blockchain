<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | MedorCoin Explorer</title>
    <!-- hCaptcha for Anti-Bot -->
    <script src="https://hcaptcha.com" async defer></script>
    <style>
        body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; background-color: #f8f9fa; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { background: #fff; width: 100%; max-width: 440px; padding: 35px; border-radius: 8px; border: 1px solid #e7eaf3; box-shadow: 0 0.5rem 1.2rem rgba(189,197,209,.15); }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 1.5rem; font-weight: 500; color: #1e2022; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; color: #4b5563; }
        input { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; font-size: 1rem; transition: border-color 0.2s; }
        input:focus { outline: none; border-color: #3498db; box-shadow: 0 0 0 3px rgba(52,152,219,.1); }
        .h-captcha { margin: 20px 0; display: flex; justify-content: center; }
        .btn-submit { width: 100%; padding: 14px; background-color: #3498db; color: white; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        .btn-submit:hover { background-color: #2980b9; }
        .error-msg { color: #dc3545; font-size: 0.85rem; margin-top: 15px; display: none; text-align: center; padding: 10px; background: #fff5f5; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Register Account</h1>
    </div>

    <form id="signupForm">
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Username" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="Email Address" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Min 12 chars, uppercase, number" required>
        </div>

        <!-- Anti-Bot Widget -->
        <div class="h-captcha" data-sitekey="YOUR_HCAPTCHA_SITE_KEY"></div>

        <div id="apiError" class="error-msg"></div>

        <button type="submit" class="btn-submit">Create Free Account</button>
    </form>
</div>

<script>
    let csrfToken = null;
    const API_BASE = "https://medorcoin.org"; // Replace with your actual API domain

    // 1. Handshake: Get CSRF Token on page load
    async function getCsrf() {
        try {
            const res = await fetch(`${API_BASE}/csrf-token`);
            const data = await res.json();
            csrfToken = data.csrfToken;
        } catch (err) {
            console.error("Security handshake failed.");
        }
    }
    getCsrf();

    const form = document.getElementById('signupForm');
    const errorDiv = document.getElementById('apiError');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorDiv.style.display = 'none';

        const captchaToken = hcaptcha.getResponse();
        if (!captchaToken) {
            errorDiv.textContent = "Please complete the Captcha.";
            errorDiv.style.display = 'block';
            return;
        }

        const payload = {
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            captchaToken: captchaToken
        };

        try {
            const response = await fetch(`${API_BASE}/signup`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-CSRF-Token': csrfToken // 2. Critical Security Header
                },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (data.success) {
                // 3. Store claimId in sessionStorage to prevent URL leaks
                sessionStorage.setItem('medor_claim_id', data.claimId);
                // Move to verify page using public address only
                window.location.href = `verify.html?address=${data.address}`;
            } else {
                errorDiv.textContent = data.error || "Signup failed.";
                errorDiv.style.display = 'block';
                hcaptcha.reset(); 
            }
        } catch (err) {
            errorDiv.textContent = "Connection failed. Ensure API is live.";
            errorDiv.style.display = 'block';
        }
    });
</script>

</body>
</html>
