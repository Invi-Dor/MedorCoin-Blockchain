<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Protocol Entry | MedorCoin Signup</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root { 
      --bg: #0b1020; --surface: #0e1520; --accent: #38bdf8; --btn: #2563eb; 
      --text: #f8fafc; --muted: #94a3b8; --error: #f87171; --success: #4ade80;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Inter', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); 
      display: flex; flex-direction: column; align-items: center; min-height: 100vh;
      background-image: radial-gradient(circle at 50% 50%, rgba(56,189,248,0.05) 0%, transparent 80%);
    }
    
    header { width: 100%; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 22px; font-weight: 800; color: var(--accent); text-decoration: none; letter-spacing: -0.5px; }
    
    .container { 
      background: var(--surface); padding: 40px; border-radius: 16px; width: 100%; max-width: 440px; 
      border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      margin: auto;
    }
    h2 { text-align: center; font-size: 1.5rem; margin-bottom: 8px; font-weight: 800; }
    .kicker { font-size: 0.75rem; color: var(--muted); text-align: center; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 0.1em; }

    label { font-size: 0.8rem; color: var(--muted); display: block; margin-top: 16px; font-weight: 600; }
    input { 
      width: 100%; padding: 12px; margin-top: 6px; border-radius: 8px; border: 1px solid #334155; 
      background: rgba(15, 23, 42, 0.5); color: white; font-size: 1rem; transition: 0.2s;
    }
    input:focus { outline: none; border-color: var(--accent); background: rgba(15, 23, 42, 0.8); }
    
    #verifySection { display: none; text-align: center; }
    .otp-group { display: flex; justify-content: center; gap: 10px; margin: 25px 0; }
    .otp-input { width: 45px; height: 55px; text-align: center; font-size: 24px; font-weight: 800; border-color: #334155; }

    .btn { 
      width: 100%; padding: 15px; background: var(--btn); color: white; border: none; border-radius: 8px; 
      cursor: pointer; font-size: 1rem; font-weight: 700; margin-top: 25px; transition: 0.2s; 
    }
    .btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { background: #334155; cursor: not-allowed; opacity: 0.6; }

    .social-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
    .apple-btn { 
      background: #fff; color: #000; width: 100%; height: 44px; border-radius: 4px; 
      display: flex; align-items: center; justify-content: center; font-weight: 600; 
      cursor: pointer; border: none; font-family: -apple-system, system-ui; 
    }
    .apple-btn img { width: 16px; margin-right: 8px; }

    .msg { font-size: 0.85rem; padding: 12px; border-radius: 8px; margin-top: 15px; display: none; text-align: center; }
    .msg.err { display: block; background: rgba(248, 113, 113, 0.1); color: var(--error); border: 1px solid rgba(248, 113, 113, 0.2); }
    .msg.ok { display: block; background: rgba(74, 222, 128, 0.1); color: var(--success); border: 1px solid rgba(74, 222, 128, 0.2); }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="logo">MEDORCOIN</a>
  <div style="font-size: 0.85rem; color: var(--muted);">Already Signed-Up? <a href="login.html" style="color: var(--accent); text-decoration: none;">Login</a></div>
</header>

<div class="container">
  <div id="signupSection">
    <h2>Genesis Enrollment</h2>
    <div class="kicker">Establish your node identity</div>
    
    <div class="social-grid">
      <div id="g_id_onload"
           data-client_id="http://650014694453-ud6jq7505nrh7ivm455p0hv86k9na6d5.apps.googleusercontent.com"
           data-callback="onSocialAuth">
      </div>
      <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="filled_blue" data-text="signup_with" data-size="large" data-width="360"></div>
      
      <button class="apple-btn" onclick="onSocialAuth({provider: 'apple'})">
        <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg"> Sign up with Apple
      </button>
    </div>

    <div style="display: flex; align-items: center; margin: 20px 0; color: #334155;">
      <hr style="flex: 1; border: 0; border-top: 1px solid #334155;">
      <span style="padding: 0 10px; font-size: 0.7rem;">OR PROTOCOL MAIL</span>
      <hr style="flex: 1; border: 0; border-top: 1px solid #334155;">
    </div>

    <form id="signupForm">
      <label>Your Email</label>
      <input type="email" id="regEmail" required placeholder="name@domain.com">
      
      <label>Node Username</label>
      <input type="text" id="regUser" required placeholder="Enter username">
      
      <label>Password</label>
      <input type="password" id="regPass" required placeholder="••••••••">
      
      <div id="signupMsg" class="msg"></div>
      <button type="submit" class="btn" id="signupBtn">Sign Up</button>
    </form>
  </div>

  <div id="verifySection">
    <h2>Verify </h2>
    <div class="kicker">Check your inbox</div>
    <p style="font-size: 0.85rem; color: var(--muted); text-align: center;">6-digit verification code sent to your email. Check your inbox or spam to confirm.</p>
    
    <div class="otp-group">
      <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
      <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
      <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
      <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
      <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
      <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
    </div>
    
    <div id="verifyMsg" class="msg"></div>
    <button class="btn" id="verifyBtn">Complete your Registration</button>
  </div>
</div>

<script>
// --- GLOBAL AUTH STATE ---
let enrollmentEmail = "";

// --- 1. SOCIAL SYNC (Bypass OTP) ---
async function onSocialAuth(response) {
  try {
    const res = await fetch("/api/auth/social-sync", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token: response.credential, provider: response.provider || 'google' })
    });
    const data = await res.json();
    if (res.ok) {
      localStorage.setItem("medor_token", data.token);
      localStorage.setItem("medor_address", data.address);
      window.location.href = "miners.html";
    }
  } catch (e) { console.error("Sync Failed", e); }
}

// --- 2. MANUAL SIGNUP INITIATION ---
document.getElementById("signupForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("signupBtn");
  const msg = document.getElementById("signupMsg");
  
  enrollmentEmail = document.getElementById("regEmail").value;
  const username = document.getElementById("regUser").value;
  const password = document.getElementById("regPass").value;

  btn.disabled = true;
  btn.innerText = "Dispatching Code...";
  msg.style.display = "none";

  try {
    const res = await fetch("/api/auth/send-otp", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: enrollmentEmail, username, password })
    });

    if (res.ok) {
      document.getElementById("signupSection").style.display = "none";
      document.getElementById("verifySection").style.display = "block";
    } else {
      const data = await res.json();
      msg.textContent = data.msg || "ID already in use.";
      msg.className = "msg err";
    }
  } catch {
    msg.textContent = "Gateway timeout.";
    msg.className = "msg err";
  } finally {
    btn.disabled = false;
    btn.innerText = "Sign Up";
  }
});

// --- 3. FINAL OTP VERIFICATION ---
document.getElementById("verifyBtn").addEventListener("click", async () => {
  const btn = document.getElementById("verifyBtn");
  const msg = document.getElementById("verifyMsg");
  const otp = Array.from(document.querySelectorAll(".otp-input")).map(i => i.value).join("");

  if (otp.length < 6) return;

  btn.disabled = true;
  btn.innerText = "Finalizing...";

  try {
    const res = await fetch("/api/auth/verify-otp", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: enrollmentEmail, code: otp })
    });

    if (res.ok) {
      msg.textContent = "Identity Confirmed. Redirecting to login...";
      msg.className = "msg ok";
      setTimeout(() => { window.location.href = "login.html?reg=success"; }, 2000);
    } else {
      msg.textContent = "Invalid verification code.";
      msg.className = "msg err";
      btn.disabled = false;
      btn.innerText = "Finalize Registration";
    }
  } catch {
    msg.textContent = "Verification link broken.";
    msg.className = "msg err";
    btn.disabled = false;
  }
});

// --- UI LOGIC: OTP AUTO-FOCUS ---
const otpInputs = document.querySelectorAll(".otp-input");
otpInputs.forEach((input, i) => {
  input.addEventListener("input", (e) => {
    if (e.target.value.length === 1 && i < 5) otpInputs[i+1].focus();
  });
  input.addEventListener("keydown", (e) => {
    if (e.key === "Backspace" && !e.target.value && i > 0) otpInputs[i-1].focus();
  });
});
</script>
</body>
</html>
