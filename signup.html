<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedorCoin | Sign Up</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  body { font-family: Arial, sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; padding: 40px 20px; }
  .container { background: #1e293b; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
  h2 { text-align: center; color: #38bdf8; margin-bottom: 25px; }
  label { font-size: 13px; color: #94a3b8; display: block; margin-top: 15px; }
  input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
  .requirements { font-size: 11px; color: #64748b; margin-top: 5px; line-height: 1.4; }
  button[type="submit"] { width: 100%; padding: 14px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 25px; }
  .error { color: #f87171; font-size: 13px; margin-top: 10px; display: none; background: rgba(248, 113, 113, 0.1); padding: 8px; border-radius: 4px; }
  
  /* Layout for the Social Buttons */
  .social-container { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; align-items: center; }
  .apple-btn { background: #000; color: #fff; border: none; width: 100%; height: 40px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; text-decoration: none; }
  .apple-btn img { width: 18px; margin-right: 8px; filter: invert(1); }
</style>
</head>
<body>

<div class="container">
  <h2>Join MedorCoin</h2>

  <div class="social-container">
    <div id="g_id_onload"
         data-client_id="650014694453-ud6jq7505nrh7ivm455p0hv86k9na6d5.apps.googleusercontent.com"
         data-context="signup"
         data-ux_mode="popup"
         data-callback="onGoogleSignup"
         data-auto_prompt="false">
    </div>

    <div class="g_id_signin"
         data-type="standard"
         data-shape="rectangular"
         data-theme="outline"
         data-text="signup_with"
         data-size="large"
         data-logo_alignment="left"
         data-width="400">
    </div>

    <button class="apple-btn" onclick="onAppleSignup()">
      <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg">
      Sign up with Apple
    </button>
  </div>

  <hr style="border:0px; border-top:1px solid #334155; margin:15px 0;">

  <form id="signupForm">
    <label>Email</label>
    <input type="email" id="email" required placeholder="name@domain.com">

    <label>Username</label>
    <input type="text" id="username" required placeholder="Create username">

    <label>Choose Password</label>
    <input type="password" id="password" required placeholder="••••••••">
    <div class="requirements">8+ characters, 1 Upper, 1 Lower, 1 Number, 1 Special Symbol.</div>

    <label>Confirm Password</label>
    <input type="password" id="confirmPassword" required placeholder="••••••••">

    <div id="errorBox" class="error"></div>
    <button type="submit" id="submitBtn">Proceed to Sign Up</button>
  </form>
</div>

<script>
// --- STRICT PASSWORD LOGIC ---
const validatePassword = (pw) => /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/.test(pw);

document.getElementById("signupForm").addEventListener("submit", async function(e) {
  e.preventDefault();
  const errorBox = document.getElementById("errorBox");
  const email = document.getElementById("email").value;
  const pw = document.getElementById("password").value;
  const confirm = document.getElementById("confirmPassword").value;

  errorBox.style.display = "none";

  if (pw !== confirm) return showError("Passwords do not match.");
  if (!validatePassword(pw)) return showError("Password must follow the 4 strict security rules.");

  // --- REAL VERIFICATION TRIGGER ---
  document.getElementById("submitBtn").innerText = "Sending Code...";
  try {
    const res = await fetch("/api/auth/send-otp", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, username: document.getElementById("username").value, password: pw })
    });

    if (res.ok) {
      window.location.href = `verify.html?email=${encodeURIComponent(email)}`;
    } else {
      showError("User already exists or network error.");
    }
  } catch (err) {
    showError("Could not connect to the server.");
  }
});

// --- LIVE GOOGLE CALLBACK ---
function onGoogleSignup(response) {
  console.log("Token received:", response.credential);
  // Send token to your backend
  fetch("/api/auth/google-verify", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ token: response.credential })
  }).then(res => res.ok ? window.location.href = "verify.html" : showError("Google Auth Failed"));
}

function onAppleSignup() {
  alert("Apple Sign-up triggered. Requires your Developer Team ID in the config.");
}

function showError(msg) {
  const eb = document.getElementById("errorBox");
  eb.innerText = msg;
  eb.style.display = "block";
  document.getElementById("submitBtn").innerText = "Proceed to Sign Up";
}
</script>
</body>
</html>
